<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="logo_circular_transparente2.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examen en Línea</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #060d1a; color: #e2e8f0; min-height: 100vh; -webkit-user-select: none; user-select: none; }
    input, textarea, select, label, .opcion { -webkit-user-select: text !important; user-select: text !important; }
    input[type="radio"], input[type="checkbox"] { -webkit-appearance: auto !important; appearance: auto !important; pointer-events: auto !important; width: 18px; height: 18px; accent-color: #0078d4; cursor: pointer; flex-shrink: 0; }

    /* ── Light mode ── */
    body.light-mode { background: #f0f4f8 !important; color: #1e293b !important; }
    body.light-mode::before { display: none; }
    body.light-mode .timer-bar { background: rgba(240,244,248,0.97) !important; border-bottom-color: rgba(30,41,59,0.15) !important; }
    body.light-mode .timer-bar .brand { color: #0078d4 !important; }
    body.light-mode #timerExamTitle { color: #475569 !important; }
    body.light-mode .exam-header { background: rgba(0,120,212,0.05) !important; border-color: rgba(0,120,212,0.15) !important; }
    body.light-mode .exam-header h1 { color: #1e293b !important; }
    body.light-mode .exam-badge { color: #0078d4 !important; }
    body.light-mode .card { background: #ffffff !important; border-color: rgba(30,41,59,0.12) !important; color: #1e293b !important; }
    body.light-mode .pregunta { background: #ffffff !important; border-color: rgba(0,120,212,0.15) !important; }
    body.light-mode .pregunta h3 { color: #1e293b !important; }
    body.light-mode .opcion { background: #f8fafc !important; border-color: rgba(30,41,59,0.1) !important; }
    body.light-mode .opcion:hover { background: rgba(0,120,212,0.08) !important; border-color: rgba(0,120,212,0.3) !important; }
    body.light-mode .opcion label { color: #334155 !important; }
    body.light-mode .exam-sidebar { background: #ffffff !important; border-color: rgba(0,120,212,0.15) !important; }
    body.light-mode .sidebar-exam-name { color: #1e293b !important; }
    body.light-mode .exam-main-title { color: #1e293b !important; }
    body.light-mode .exam-main-label { color: #0078d4 !important; }
    body.light-mode .form-group label { color: #475569 !important; }
    body.light-mode .form-group input { background: #f8fafc !important; border-color: #cbd5e1 !important; color: #1e293b !important; }
    body.light-mode h1, body.light-mode h2, body.light-mode h3 { color: #1e293b !important; }
    body.light-mode p { color: #475569 !important; }
    body.light-mode .multi-hint { color: #0078d4 !important; background: rgba(0,120,212,0.06) !important; }
    body.light-mode .pares-hint { color: #475569 !important; background: rgba(30,41,59,0.04) !important; border-color: rgba(30,41,59,0.1) !important; }
    body.light-mode .pares-hint strong { color: #1e293b !important; }
    body.light-mode .par-btn { background: #f8fafc !important; border-color: rgba(30,41,59,0.2) !important; color: #334155 !important; }
    body.light-mode .numeric-input { background: #f8fafc !important; border-color: rgba(0,120,212,0.3) !important; color: #1e293b !important; }
    body.light-mode .numeric-hint { color: #64748b !important; }
    body.light-mode .resultado.aprobado { background: rgba(5,150,105,0.06) !important; }
    body.light-mode .resultado.reprobado { background: rgba(220,38,38,0.06) !important; }
    body.light-mode .resultado h2 { color: inherit !important; }
    body.light-mode [style*="color:#94a3b8"] { color: #64748b !important; }
    body.light-mode [style*="color:#f1f5f9"] { color: #1e293b !important; }
    body.light-mode [style*="color:#f8fafc"] { color: #1e293b !important; }
    body.light-mode [style*="color:#cbd5e1"] { color: #475569 !important; }
    body.light-mode [style*="color:#64748b"] { color: #64748b !important; }
    body.light-mode [style*="color:#60a5fa"] { color: #0078d4 !important; }
    body.light-mode .progress-bar { background: #e2e8f0 !important; }
    body.light-mode .nav-dot { background: #f1f5f9 !important; border-color: #cbd5e1 !important; color: #64748b !important; }
    body.light-mode .nav-dot.activa { background: rgba(0,120,212,0.15) !important; border-color: #0078d4 !important; color: #0078d4 !important; }
    body.light-mode .nav-dot.respondida { background: rgba(5,150,105,0.12) !important; border-color: #059669 !important; color: #059669 !important; }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0,120,212,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,120,212,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 16px 20px; position: relative; z-index: 1; }

    /* ── Exam layout: sidebar + main ── */
    .exam-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 20px;
      align-items: start;
      min-height: calc(100vh - 100px);
    }

    /* ── Sidebar ── */
    .exam-sidebar {
      position: sticky;
      top: 76px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(0,120,212,0.2);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(8px);
    }
    .sidebar-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #60a5fa;
      margin-bottom: 4px;
    }
    .sidebar-exam-name {
      font-size: 0.92rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 14px;
      line-height: 1.4;
      border-bottom: 1px solid rgba(0,120,212,0.15);
      padding-bottom: 12px;
    }
    .sidebar-dots-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #475569;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .sidebar-dots {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }

    /* ── Main question area ── */
    .exam-main { min-width: 0; }
    .exam-main-header {
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(0,120,212,0.15);
    }
    .exam-main-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #60a5fa;
      margin-bottom: 4px;
    }
    .exam-main-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: #f8fafc;
      letter-spacing: -0.5px;
    }

    /* ── Question card fills the space ── */
    .pregunta {
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(0,120,212,0.15);
      border-radius: 14px;
      padding: 28px 32px;
      margin-bottom: 0;
      transition: 0.2s;
      position: relative;
      width: 100%;
    }
    .pregunta:hover { border-color: rgba(0,120,212,0.3); }

    @media (max-width: 768px) {
      .exam-layout { grid-template-columns: 1fr; gap: 10px; }
      .exam-sidebar { position: static; padding: 12px; }
      .sidebar-exam-name { font-size: 0.82rem; margin-bottom: 10px; padding-bottom: 8px; }
      .sidebar-dots { grid-template-columns: repeat(8, 1fr); gap: 4px; }
      .exam-main-title { font-size: 1.1rem; }
      .exam-main-header { margin-bottom: 12px; padding-bottom: 10px; }
      .pregunta { padding: 16px 14px; }
      .pregunta h3 { font-size: 1rem; margin-bottom: 16px; }
      .opcion { padding: 12px 14px; margin: 8px 0; }
      .opcion label { font-size: 0.95rem; gap: 10px; }
      .container { padding: 10px 12px; }
    }

    @media (max-width: 480px) {
      .sidebar-dots { grid-template-columns: repeat(6, 1fr); }
      .exam-main-title { font-size: 1rem; }
      .pregunta h3 { font-size: 0.95rem; }
      .opcion label { font-size: 0.9rem; }
      .nota-badge { font-size: 1.3rem; padding: 8px 20px; }
      .resultado h2 { font-size: 1.4rem; }
    }

    /* ── Sticky timer bar ── */
    .timer-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(6,13,26,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,120,212,0.3);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 2px 20px rgba(0,120,212,0.15);
    }

    .timer-bar .brand { font-size: 0.85rem; font-weight: 700; color: #60a5fa; display: flex; align-items: center; gap: 6px; }
    .timer-bar .brand img { height: 28px; filter: brightness(1.2); }

    .timer-center { display: flex; align-items: center; gap: 10px; }

    .timer-display {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 6px 16px;
      font-size: 1.2rem;
      font-weight: 900;
      color: #f87171;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    .timer-display .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

    .timer-warning { color: #f59e0b !important; border-color: rgba(245,158,11,0.4) !important; background: rgba(245,158,11,0.1) !important; }
    .timer-critical { color: #ef4444 !important; border-color: rgba(239,68,68,0.6) !important; background: rgba(239,68,68,0.15) !important; animation: blink 0.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.6} }

    .progress-wrap { flex: 1; max-width: 200px; }
    .progress-label { font-size: 0.72rem; color: #64748b; margin-bottom: 4px; text-align: right; }
    .progress-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #0078d4, #00bcf2); border-radius: 3px; transition: width 0.4s; }

    /* ── Exam header ── */
    .exam-header {
      margin-top: 70px;
      margin-bottom: 28px;
      background: linear-gradient(135deg, rgba(0,120,212,0.08), rgba(0,188,242,0.04));
      border: 1px solid rgba(0,120,212,0.2);
      border-radius: 16px;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }

    .exam-header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,120,212,0.12), transparent 70%);
    }

    .exam-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(0,120,212,0.15);
      border: 1px solid rgba(0,120,212,0.3);
      color: #60a5fa;
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .exam-header h1 {
      font-size: 1.7rem;
      font-weight: 900;
      color: #f8fafc;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .exam-header .sub { color: #94a3b8; font-size: 0.88rem; text-align: left; }

    /* ── Card ── */
    .card {
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(148,163,184,0.1);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 480px) {
      .card { padding: 20px 16px; }
    }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 16px; background: #060d1a; border: 1px solid #334155; border-radius: 10px; color: #f1f5f9; font-size: 0.95rem; transition: 0.2s; }
    .form-group input:focus { outline: none; border-color: #0078d4; box-shadow: 0 0 0 3px rgba(0,120,212,0.15); }

    /* ── Buttons ── */
    .btn { padding: 12px 24px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg, #0078d4, #005a9e); color: white; box-shadow: 0 4px 14px rgba(0,120,212,0.3); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 4px 14px rgba(239,68,68,0.25); }

    /* ── Questions ── */
    .pregunta {
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(0,120,212,0.15);
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 16px;
      transition: 0.2s;
      position: relative;
    }

    .pregunta:hover { border-color: rgba(0,120,212,0.3); box-shadow: 0 0 20px rgba(0,120,212,0.08); }

    .pregunta-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #0078d4, #005a9e);
      color: white;
      font-size: 0.78rem;
      font-weight: 900;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,120,212,0.3);
    }

    .pregunta h3 { font-size: 1.35rem; font-weight: 700; color: #f1f5f9; line-height: 1.65; margin-bottom: 24px; }
    .pregunta img { max-width: 100%; border-radius: 10px; margin-bottom: 16px; border: 1px solid rgba(0,120,212,0.2); }

    .opcion {
      margin: 10px 0;
      padding: 16px 22px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,0.1);
      cursor: pointer;
      transition: 0.15s;
      touch-action: manipulation;
      background: rgba(30,41,59,0.5);
    }

    .opcion:hover { background: rgba(0,120,212,0.1); border-color: rgba(0,120,212,0.3); }
    .opcion label { display: flex; align-items: center; gap: 14px; cursor: pointer; font-size: 1.1rem; color: #cbd5e1; line-height: 1.5; }

    @media (max-width: 768px) {
      .pregunta h3 { font-size: 1.1rem; }
      .opcion label { font-size: 1rem; }
      .opcion { padding: 13px 16px; }
    }

    /* ── Result ── */
    .resultado { text-align: center; padding: 40px 28px; border-radius: 16px; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .resultado.aprobado { background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(6,182,212,0.04)); border: 1px solid rgba(16,185,129,0.3); }
    .resultado.reprobado { background: linear-gradient(135deg, rgba(239,68,68,0.08), rgba(244,63,94,0.04)); border: 1px solid rgba(239,68,68,0.3); }
    .resultado h2 { font-size: 1.8rem; margin-bottom: 12px; font-weight: 900; }
    .resultado.aprobado h2 { color: #34d399; }
    .resultado.reprobado h2 { color: #f87171; }
    .nota-badge { display: inline-block; padding: 10px 28px; border-radius: 30px; font-size: 1.6rem; font-weight: 900; margin: 16px 0; }
    .resultado.aprobado .nota-badge { background: rgba(16,185,129,0.15); color: #34d399; border: 2px solid rgba(16,185,129,0.3); }
    .resultado.reprobado .nota-badge { background: rgba(239,68,68,0.15); color: #f87171; border: 2px solid rgba(239,68,68,0.3); }

    .hidden { display: none !important; }
    .msg { padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 0.85rem; }
    .msg-err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .multi-hint { font-size: 0.75rem; color: #60a5fa; margin-bottom: 10px; font-weight: 600; background: rgba(0,120,212,0.08); padding: 6px 10px; border-radius: 6px; display: inline-block; }

    @media (max-width: 768px) {
      .timer-bar { padding: 8px 12px; gap: 8px; }
      .timer-bar .brand img { height: 22px; }
      .timer-bar .brand span#timerExamTitle { display: none; }
      .timer-display { font-size: 1rem; padding: 5px 10px; letter-spacing: 1px; }
      .progress-wrap { display: none; }
      .exam-header { padding: 16px; margin-top: 56px; }
      .exam-header h1 { font-size: 1.2rem; }
    }

    @media (max-width: 480px) {
      .timer-bar .brand { display: none; }
      .timer-bar { justify-content: center; gap: 12px; }
      .timer-display { font-size: 1.1rem; }
    }

    /* ── Animations ── */
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0%   { transform: scale(0.85); opacity: 0; }
      70%  { transform: scale(1.04); }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes celebracion {
      0%,100% { transform: scale(1) rotate(0deg); }
      20%     { transform: scale(1.06) rotate(-2deg); }
      40%     { transform: scale(1.06) rotate(2deg); }
      60%     { transform: scale(1.03) rotate(-1deg); }
      80%     { transform: scale(1.03) rotate(1deg); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%     { transform: translateX(-8px); }
      30%     { transform: translateX(8px); }
      45%     { transform: translateX(-6px); }
      60%     { transform: translateX(6px); }
      75%     { transform: translateX(-3px); }
      90%     { transform: translateX(3px); }
    }
    .pregunta { animation: slideInUp 0.4s ease both; }
    .resultado.aprobado { animation: popIn 0.5s ease both, celebracion 0.8s ease 0.5s both; }
    .resultado.reprobado { animation: popIn 0.5s ease both, shake 0.6s ease 0.5s both; }
    .opcion { transition: background 0.15s, border-color 0.15s, transform 0.1s; }
    .opcion:has(input:checked) {
      background: rgba(0,120,212,0.18) !important;
      border-color: rgba(0,120,212,0.5) !important;
      transform: scale(1.01);
    }

    /* ── Image options ── */
    .opciones-imagen {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 8px;
    }
    .opcion-img {
      border: 2px solid rgba(148,163,184,0.15);
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: 0.15s;
      background: rgba(30,41,59,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }
    .opcion-img:hover { border-color: rgba(0,120,212,0.4); background: rgba(0,120,212,0.08); }
    .opcion-img.selected { border-color: #0078d4; background: rgba(0,120,212,0.15); box-shadow: 0 0 14px rgba(0,120,212,0.2); }
    .opcion-img img { max-width: 100%; max-height: 120px; border-radius: 8px; object-fit: contain; }
    .opcion-img span { font-size: 0.88rem; color: #cbd5e1; }

    /* ── Numeric answer ── */
    .numeric-input-wrap {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .numeric-input {
      width: 200px;
      padding: 16px 20px;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      background: rgba(15,23,42,0.9);
      border: 2px solid rgba(0,120,212,0.3);
      border-radius: 14px;
      color: #f1f5f9;
      outline: none;
      transition: 0.2s;
      -webkit-user-select: text !important;
      user-select: text !important;
    }
    .numeric-input:focus { border-color: #0078d4; box-shadow: 0 0 0 3px rgba(0,120,212,0.2); }
    .numeric-hint { font-size: 0.78rem; color: #64748b; }

    @media (max-width: 600px) {
      .opciones-imagen { grid-template-columns: 1fr 1fr; }
      .numeric-input { width: 160px; font-size: 1.2rem; }
    }
    .pares-wrap {
      margin-top: 14px;
      display: flex;
      gap: 0;
      align-items: stretch;
      position: relative;
    }
    .pares-col-izq, .pares-col-der {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }
    .pares-svg-area {
      width: 120px;
      flex-shrink: 0;
      position: relative;
    }
    .pares-svg-area svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: visible;
      pointer-events: none;
    }
    .par-btn {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #f1f5f9;
      cursor: pointer;
      border: 2px solid rgba(148,163,184,0.25);
      background: rgba(30,41,59,0.6);
      text-align: center;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      user-select: none;

    /* ── Slide animation ── */
    @keyframes slideInRight { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideInLeft  { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:translateX(0); } }
    .slide-right { animation: slideInRight 0.25s ease both; }
    .slide-left  { animation: slideInLeft  0.25s ease both; }

    /* ── Light mode for examen ── */
    body.light-mode { background: #f0f4f8; color: #1e293b; }
    body.light-mode body::before { background-image: linear-gradient(rgba(0,120,212,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,120,212,0.03) 1px, transparent 1px); }

</head>

  <!-- Login -->

    <div class="card" style="max-width:420px; margin:0 auto;">
      <div style="text-align:center; margin-bottom:16px;"><img src="logo_circular_transparente2.png" alt="Logo" style="height:120px; filter:drop-shadow(0 4px 20px rgba(0,188,242,0.7)) brightness(1.3);"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>
  // ── Dark/Light mode ──
  function toggleDarkMode() {
    const isLight = document.body.classList.toggle('light-mode');
    localStorage.setItem('colorMode', isLight ? 'light' : 'dark');
    const btn = document.getElementById('darkToggle');
    if (btn) btn.textContent = isLight ? '☀️' : '🌙';
  }
  (function() {
    if (localStorage.getItem('colorMode') === 'light') {
      document.body.classList.add('light-mode');
      const btn = document.getElementById('darkToggle');
      if (btn) btn.textContent = '☀️';
    }
  })();

  // ── Anti-copy & Anti-AI protections ──

  // Block right-click and context menu (mobile long-press too)
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Block copy/cut/paste
  document.addEventListener('copy', e => e.preventDefault());
  document.addEventListener('cut', e => e.preventDefault());

  // Block keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && 'cusCUSaA'.includes(e.key)) { e.preventDefault(); }
    if (e.key === 'F12') e.preventDefault();
    if (e.ctrlKey && e.shiftKey) e.preventDefault();
  });

  // Block drag (prevents drag-to-select on mobile)
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => {
    // Allow selection only in input fields
    if (!e.target.matches('input, textarea')) e.preventDefault();
  });

  // Block long-press on mobile (prevents "Copy" menu)
  document.addEventListener('touchstart', function(e) {
    if (e.target.matches('input, textarea, select, button, label')) return;
    e.target.style.webkitUserSelect = 'none';
    e.target.style.userSelect = 'none';
  }, { passive: true });

  // Block iOS share sheet text selection
  document.addEventListener('touchend', function(e) {
    if (!e.target.matches('input, textarea, select, button, label')) {
      window.getSelection && window.getSelection().removeAllRanges();
    }
  });

  // Detect screenshot attempt on Android (visibility change)
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      // Page went to background - possible screenshot
      document.querySelectorAll('.pregunta h3').forEach(el => {
        el.setAttribute('data-original', el.textContent);
        el.textContent = '[ Contenido oculto — regresa al examen ]';
      });
    } else {
      // Page came back - restore content
      document.querySelectorAll('.pregunta h3').forEach(el => {
        const orig = el.getAttribute('data-original');
        if (orig) { el.textContent = orig; el.removeAttribute('data-original'); }
      });
    }
  });

  // Inject zero-width characters into question text to corrupt AI paste
  function injectZeroWidth(text) {
    const zwc = ['\u200B', '\u200C', '\u200D', '\uFEFF'];
    return text.split('').map((c, i) =>
      i % 4 === 0 ? c + zwc[i % zwc.length] : c
    ).join('');
  }

  // Apply after questions load
  function applyAntiAI() {
    document.querySelectorAll('.pregunta h3, .opcion span').forEach(el => {
      if (!el.getAttribute('data-protected')) {
        el.textContent = injectZeroWidth(el.textContent);
        el.setAttribute('data-protected', '1');
      }
    });
  }

  // Click handler for options
  document.addEventListener('click', function(e) {
    var op = e.target.closest('.opcion');
    if (op && e.target.tagName !== 'INPUT') {
      var inp = op.querySelector('input');
      if (inp) {
        if (inp.type==='radio') { inp.checked=true; }
        else { inp.checked=!inp.checked; }
        inp.dispatchEvent(new Event('change',{bubbles:true}));
      }
    }
  });

  // Get exam ID from URL
  const params = new URLSearchParams(window.location.search);
  const examenId = params.get('id');
  const isPreview = params.get('preview') === '1';
  let examenData = null;
  let currentUser = null;
  let currentSesionId = null;
  let tiempoRestante = 2400;
  let timer = null;
  let examenCargado = false;

  if (!examenId) { document.querySelector('.container').innerHTML = '<div class="card" style="text-align:center;"><h2 style="color:#f87171;">❌ No se especificó un examen</h2><p style="color:#94a3b8;">Esta URL necesita un ID de examen válido.</p></div>'; }

  // Load exam info
  (async function() {
    if (!examenId) return;
    try {
      examenData = await getExamen(examenId);
      if (!examenData) {
        document.querySelector('.container').innerHTML = '<div class="card" style="text-align:center;"><h2 style="color:#f87171;">❌ Examen no encontrado</h2><p style="color:#94a3b8;">El ID del examen no es válido o fue eliminado.</p></div>';
        return;
      }
      document.getElementById('exTitulo').textContent = examenData.titulo;
      document.getElementById('exSubtitulo').textContent = examenData.subtitulo || 'Complete la evaluación dentro del tiempo establecido';
      document.getElementById('examBadge').textContent = '☁️ ' + (examenData.subtitulo || examenData.titulo);
      document.title = examenData.titulo;
      tiempoRestante = (examenData.tiempoMinutos || 40) * 60;
      examenCargado = true;

      // ── Check date range (show notice above login form) ──
      const ahora = new Date();
      if (examenData.fechaApertura) {
        const apertura = new Date(examenData.fechaApertura);
        if (ahora < apertura) {
          const fechaStr = apertura.toLocaleString('es-ES', { dateStyle: 'long', timeStyle: 'short' });
          document.getElementById('loginMsg').innerHTML = '<div class="msg msg-err" style="font-size:0.9rem;">🔒 Este examen aún no está disponible.<br><strong>Disponible desde: ' + fechaStr + '</strong></div>';
          document.querySelector('#secLogin .card button').disabled = true;
          document.querySelector('#secLogin .card button').style.opacity = '0.4';
        }
      }
      if (examenData.fechaCierre) {
        const cierre = new Date(examenData.fechaCierre);
        if (ahora > cierre) {
          const fechaStr = cierre.toLocaleString('es-ES', { dateStyle: 'long', timeStyle: 'short' });
          document.getElementById('loginMsg').innerHTML = '<div class="msg msg-err" style="font-size:0.9rem;">🔒 Este examen ya no está disponible.<br><strong>Cerró el: ' + fechaStr + '</strong></div>';
          document.querySelector('#secLogin .card button').disabled = true;
          document.querySelector('#secLogin .card button').style.opacity = '0.4';
        }
      }

      // Preview mode: skip login, start directly
      if (isPreview) {
        // Show preview banner
        document.body.insertAdjacentHTML('afterbegin', `
          <div id="previewBanner" style="position:fixed;top:0;left:0;right:0;z-index:999;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;text-align:center;padding:10px 20px;font-size:0.88rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:16px;">
            <span>👁️ MODO VISTA PREVIA — Las respuestas y notas NO se guardan</span>
            <button onclick="window.close()" style="background:#000;color:#fbbf24;border:none;padding:4px 14px;border-radius:6px;cursor:pointer;font-weight:700;font-size:0.8rem;">✕ Cerrar</button>
          </div>`);
        // Push content down
        document.querySelector('.container').style.marginTop = '44px';
        // Set fake user
        currentUser = { id: 'preview', nombre: 'Vista Previa', username: 'preview', tipo: 'preview' };
        iniciarExamen();
      }
    } catch(err) {
      console.error('Error cargando examen:', err);
      document.querySelector('.container').innerHTML = '<div class="card" style="text-align:center;"><h2 style="color:#f87171;">❌ Error de conexión</h2><p style="color:#94a3b8;">No se pudo conectar con la base de datos. Recargue la página.</p></div>';
    }
  })();

  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); });
  document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); });

  async function handleLogin() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    const emailInput = document.getElementById('loginEmail').value.trim();
    const sinCorreo = document.getElementById('sinCorreo').checked;
    if (!u||!p) { document.getElementById('loginMsg').innerHTML='<div class="msg msg-err">⚠️ Ingrese usuario y contraseña</div>'; return; }
    if (!sinCorreo && !emailInput) { document.getElementById('loginMsg').innerHTML='<div class="msg msg-err">⚠️ Ingrese su correo o marque "sin correo"</div>'; return; }

    if (!examenCargado) {
      document.getElementById('loginMsg').innerHTML='<div class="msg msg-err">⏳ El examen aún está cargando. Espere un momento.</div>';
      return;
    }

    document.getElementById('loginMsg').innerHTML='<div style="padding:10px;border-radius:8px;margin-bottom:14px;font-size:0.85rem;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);color:#60a5fa;">⏳ Verificando...</div>';

    const r = await loginGeneral(u, p, examenData ? examenData.createdBy : '');
    if (r.success) {
      currentUser = r.user;
      currentUser.email = sinCorreo ? '' : emailInput;

      // Check for active session (anti-trampa) — skip in preview
      if (!isPreview) {
        const sesionCheck = await registrarSesion(currentUser.id, examenId, examenData.reconexionMinutos);
        if (!sesionCheck.success) {
          document.getElementById('loginMsg').innerHTML = '<div class="msg msg-err">🚫 ' + sesionCheck.error + '</div>';
          return;
        }
        currentSesionId = sesionCheck.sesionId;

        // Check attempt limit
        const intentosPermitidos = examenData.intentosPermitidos || 0;
        if (intentosPermitidos > 0) {
          const intentosPrevios = await getGradesByUserAndExamen(currentUser.id, examenId);
          if (intentosPrevios.length >= intentosPermitidos) {
            document.getElementById('loginMsg').innerHTML = '<div class="msg msg-err">🚫 Has alcanzado el límite de intentos para este examen (' + intentosPermitidos + ' intento' + (intentosPermitidos > 1 ? 's' : '') + ' permitido' + (intentosPermitidos > 1 ? 's' : '') + ').</div>';
            return;
          }
        }
      }

      iniciarExamen();
    }
    else { document.getElementById('loginMsg').innerHTML='<div class="msg msg-err">❌ '+r.error+'</div>'; }
  }

  function iniciarExamen() {
    if (!examenData || !examenData.preguntas || examenData.preguntas.length === 0) {
      document.getElementById('loginMsg').innerHTML='<div class="msg msg-err">❌ Este examen no tiene preguntas configuradas.</div>';
      return;
    }
    document.getElementById('secLogin').classList.add('hidden');
    document.getElementById('examHeader').classList.add('hidden');
    document.getElementById('secExamen').classList.remove('hidden');
    document.getElementById('timerBar').classList.remove('hidden');
    document.getElementById('timerExamTitle').textContent = examenData.titulo || '';
    document.getElementById('navTotal').textContent = examenData.preguntas.length;
    document.getElementById('totalPreg').textContent = examenData.preguntas.length;
    // Set sidebar exam name
    const sidebarName = document.getElementById('sidebarExamName');
    if (sidebarName) sidebarName.textContent = examenData.titulo || 'Examen';

    // ── Música de fondo durante el examen ──
    if (examenData.audioExamen) {
      try {
        const audio = new Audio(examenData.audioExamen);
        audio.loop = true;
        audio.volume = 0.3;
        audio.play().catch(() => {});
        window._audioExamen = audio;
      } catch(e) {}
    }

    // Pre-process all questions (shuffle options, init pares)
    prepararPreguntas();
    // Build nav dots
    buildNavDots();
    // Show first question
    preguntaActual = 0;
    mostrarPregunta(0, 'right');

    actualizarTiempo();
    timer = setInterval(() => {
      tiempoRestante--;
      actualizarTiempo();
      if (tiempoRestante <= 0) { clearInterval(timer); finalizar(); }
    }, 1000);
  }

  let preguntaActual = 0;
  let slideDir = 'right';

  function prepararPreguntas() {
    examenData.preguntas.forEach((item, idx) => {
      if (item.tipo === 'pares') {
        const pares = item.pares || [];
        const derItems = pares.map((p, i) => ({ text: p.der, origIdx: i }));
        for (let i = derItems.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [derItems[i], derItems[j]] = [derItems[j], derItems[i]];
        }
        item._derShuffled = derItems;
        item._conexiones = {};
      } else if (item.tipo === 'imagen') {
        // Shuffle image options
        const opts = (item.opciones || []).map((o, i) => ({ ...o, i }));
        for (let i = opts.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        item._shuffledImg = opts;
        item._shuffledCorrectaImg = opts.findIndex(o => o.i === item.correcta);
        item._userAnswer = undefined;
      } else if (item.tipo === 'numerico') {
        item._userNumeric = '';
      } else {
        const opts = item.opciones.map((t, i) => ({ t, i }));
        for (let i = opts.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        item._shuffled = opts;
        item._shuffledCorrecta = Array.isArray(item.correcta)
          ? item.correcta.map(c => opts.findIndex(o => o.i === c))
          : opts.findIndex(o => o.i === item.correcta);
      }
    });
  }

  function buildNavDots() {
    const container = document.getElementById('navDots');
    container.innerHTML = '';
    container.className = 'sidebar-dots';
    examenData.preguntas.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'nav-dot';
      dot.textContent = i + 1;
      dot.id = `dot_${i}`;
      dot.onclick = () => irAPregunta(i);
      container.appendChild(dot);
    });
  }

  function mostrarPregunta(idx, dir) {
    const container = document.getElementById('preguntasContainer');
    const item = examenData.preguntas[idx];
    const div = document.createElement('div');
    div.className = 'pregunta ' + (dir === 'right' ? 'slide-right' : 'slide-left');

    if (item.tipo === 'pares') {
      const pares = item.pares || [];
      let izqHtml = pares.map((p, pi) =>
        `<div class="par-btn" id="izq_${idx}_${pi}" onclick="clickIzq(${idx},${pi})">${p.izq}</div>`
      ).join('');
      let derHtml = item._derShuffled.map((d, di) =>
        `<div class="par-btn par-btn-der" id="der_${idx}_${di}" onclick="clickDer(${idx},${di})">${d.text}</div>`
      ).join('');
      div.innerHTML = `
        <div class="pregunta-num">${idx + 1}</div>
        <h3>${item.pregunta}</h3>
        <div class="pares-hint">
          🔗 <strong>Cómo responder:</strong> Clic en un elemento de la izquierda → luego clic en su par de la derecha.<br>
          🎨 <strong>Las respuestas asociadas comparten el mismo color</strong> (borde + flecha).<br>
          ✏️ Para deshacer una conexión, clic sobre la flecha o sobre el elemento izquierdo ya conectado.
        </div>
        <div class="pares-wrap" id="paresWrap_${idx}">
          <div class="pares-col-izq" id="colIzq_${idx}">${izqHtml}</div>
          <div class="pares-svg-area" id="svgArea_${idx}"><svg id="svgLines_${idx}"></svg></div>
          <div class="pares-col-der" id="colDer_${idx}">${derHtml}</div>
        </div>
        <button class="pares-reset" onclick="resetPares(${idx})">🗑️ Borrar todas las conexiones</button>`;

      // Restore existing connections visually
      setTimeout(() => {
        if (Object.keys(item._conexiones).length > 0) redrawLines(idx);
      }, 50);
    } else if (item.tipo === 'imagen') {
      const imgHtml = item.imagen ? `<img src="${item.imagen}" alt="Imagen" style="max-width:100%;border-radius:10px;margin-bottom:14px;">` : '';
      let optsHtml = '<div class="opciones-imagen">';
      (item._shuffledImg || []).forEach((o, si) => {
        const sel = item._userAnswer === si ? 'selected' : '';
        optsHtml += `<div class="opcion-img ${sel}" id="imgopt_${idx}_${si}" onclick="selectImgOpcion(${idx},${si})">
          ${o.imagen ? `<img src="${o.imagen}" alt="${o.texto||'Opción'}">` : ''}
          ${o.texto ? `<span>${o.texto}</span>` : ''}
        </div>`;
      });
      optsHtml += '</div>';
      div.innerHTML = `<div class="pregunta-num">${idx+1}</div><h3>${item.pregunta}</h3>${imgHtml}${optsHtml}`;
    } else if (item.tipo === 'numerico') {
      const imgHtml = item.imagen ? `<img src="${item.imagen}" alt="Imagen" style="max-width:100%;border-radius:10px;margin-bottom:14px;">` : '';
      div.innerHTML = `<div class="pregunta-num">${idx+1}</div><h3>${item.pregunta}</h3>${imgHtml}
        <div class="numeric-input-wrap">
          <p class="numeric-hint">✏️ Escribe tu respuesta numérica (entero, decimal o fracción)</p>
          <input class="numeric-input" type="text" inputmode="decimal" id="numInput_${idx}"
            value="${item._userNumeric || ''}"
            placeholder="0"
            oninput="saveNumeric(${idx}, this.value)"
            autocomplete="off" autocorrect="off" spellcheck="false">
          <p class="numeric-hint">Ejemplos válidos: 42 · 3.14 · 1/2</p>
        </div>`;
    } else {
      const esMulti = Array.isArray(item.correcta);
      const inputType = esMulti ? 'checkbox' : 'radio';
      let optsHtml = esMulti ? '<p class="multi-hint">📌 Seleccione ' + item.correcta.length + ' respuestas</p>' : '';
      item._shuffled.forEach((o, i) => {
        const checked = esMulti
          ? (item._userAnswers && item._userAnswers.includes(i) ? 'checked' : '')
          : (item._userAnswer === i ? 'checked' : '');
        optsHtml += `<div class="opcion"><label><input type="${inputType}" name="p${idx}" value="${i}" ${checked} onchange="saveAnswer(${idx})"><span>${o.t}</span></label></div>`;
      });
      const imgHtml = item.imagen ? `<img src="${item.imagen}" alt="Imagen">` : '';
      div.innerHTML = `<div class="pregunta-num">${idx + 1}</div><h3>${item.pregunta}</h3>${imgHtml}${optsHtml}`;
    }

    container.innerHTML = '';
    container.appendChild(div);

    // Update nav state
    document.getElementById('navActual').textContent = idx + 1;
    document.querySelectorAll('.nav-dot').forEach((d, i) => {
      d.classList.toggle('activa', i === idx);
    });
    updateNavButtons(idx);
    updateProgress();
    setTimeout(applyAntiAI, 100);
  }

  function saveAnswer(idx) {
    const item = examenData.preguntas[idx];
    if (item.tipo === 'pares') return;
    if (item.tipo === 'imagen') return; // handled by selectImgOpcion
    if (item.tipo === 'numerico') return; // handled by saveNumeric
    const esMulti = Array.isArray(item.correcta);
    if (esMulti) {
      item._userAnswers = Array.from(document.querySelectorAll(`input[name="p${idx}"]:checked`)).map(el => parseInt(el.value));
    } else {
      const sel = document.querySelector(`input[name="p${idx}"]:checked`);
      item._userAnswer = sel ? parseInt(sel.value) : undefined;
    }
    updateProgress();
  }

  function selectImgOpcion(pregIdx, shuffledIdx) {
    const item = examenData.preguntas[pregIdx];
    item._userAnswer = shuffledIdx;
    // Update visual
    document.querySelectorAll(`[id^="imgopt_${pregIdx}_"]`).forEach(el => el.classList.remove('selected'));
    const sel = document.getElementById(`imgopt_${pregIdx}_${shuffledIdx}`);
    if (sel) sel.classList.add('selected');
    updateProgress();
  }

  function saveNumeric(pregIdx, val) {
    examenData.preguntas[pregIdx]._userNumeric = val;
    updateProgress();
  }

  function navPregunta(dir) {
    const nuevo = preguntaActual + dir;
    if (nuevo < 0 || nuevo >= examenData.preguntas.length) return;
    irAPregunta(nuevo, dir > 0 ? 'right' : 'left');
  }

  function irAPregunta(idx, dir) {
    dir = dir || (idx > preguntaActual ? 'right' : 'left');
    preguntaActual = idx;
    mostrarPregunta(idx, dir);
  }

  function updateNavButtons(idx) {
    const total = examenData.preguntas.length;
    const btnAnterior = document.getElementById('btnAnterior');
    const btnSiguiente = document.getElementById('btnSiguiente');
    const btnFinalizar = document.getElementById('btnFinalizar');
    btnAnterior.style.opacity = idx === 0 ? '0.3' : '1';
    btnAnterior.style.pointerEvents = idx === 0 ? 'none' : 'auto';
    if (idx === total - 1) {
      btnSiguiente.style.display = 'none';
      btnFinalizar.style.display = '';
    } else {
      btnSiguiente.style.display = '';
      btnFinalizar.style.display = 'none';
    }
  }

  function confirmarFinalizar() {
    const total = examenData.preguntas.length;
    const respondidas = contarRespondidas();
    if (respondidas < total) {
      if (!confirm(`Tienes ${total - respondidas} pregunta(s) sin responder. ¿Deseas finalizar de todas formas?`)) return;
    }
    finalizar();
  }

  function contarRespondidas() {
    let count = 0;
    examenData.preguntas.forEach((item, i) => {
      if (item.tipo === 'pares') {
        if (Object.keys(item._conexiones || {}).length === (item.pares || []).length) count++;
      } else if (item.tipo === 'imagen') {
        if (item._userAnswer !== undefined) count++;
      } else if (item.tipo === 'numerico') {
        if (item._userNumeric !== undefined && item._userNumeric !== '') count++;
      } else {
        const esMulti = Array.isArray(item.correcta);
        if (esMulti) { if ((item._userAnswers || []).length > 0) count++; }
        else { if (item._userAnswer !== undefined) count++; }
      }
    });
    return count;
  }

  function actualizarTiempo() {
    const m = Math.floor(tiempoRestante/60); const s = tiempoRestante%60;
    const timeStr = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    document.getElementById('tiempo').textContent = timeStr;
    // Color changes
    const td = document.getElementById('timerDisplay');
    if (td) {
      td.className = 'timer-display';
      if (tiempoRestante <= 60) td.classList.add('timer-critical');
      else if (tiempoRestante <= 300) td.classList.add('timer-warning');
    }
  }

  function cargarPreguntas() {
    const container = document.getElementById('preguntasContainer');
    if (!container) { console.error('preguntasContainer not found'); return; }
    container.innerHTML = '';

    if (!examenData || !examenData.preguntas || examenData.preguntas.length === 0) {
      container.innerHTML = '<div class="card" style="text-align:center;color:#f87171;">❌ Este examen no tiene preguntas.</div>';
      return;
    }

    examenData.preguntas.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'pregunta';

      if (item.tipo === 'pares') {
        // ── Flechas / click-to-connect ──
        const pares = item.pares || [];
        // Shuffle right side
        const derItems = pares.map((p, i) => ({ text: p.der, origIdx: i }));
        for (let i = derItems.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [derItems[i], derItems[j]] = [derItems[j], derItems[i]];
        }
        item._derShuffled = derItems;
        item._conexiones = {}; // { izqIdx: derShuffledIdx }

        let izqHtml = pares.map((p, pi) =>
          `<div class="par-btn" id="izq_${idx}_${pi}" onclick="clickIzq(${idx},${pi})">${p.izq}</div>`
        ).join('');

        let derHtml = derItems.map((d, di) =>
          `<div class="par-btn par-btn-der" id="der_${idx}_${di}" onclick="clickDer(${idx},${di})">${d.text}</div>`
        ).join('');

        div.innerHTML = `
          <div class="pregunta-num">${idx + 1}</div>
          <h3>${item.pregunta}</h3>
          <div class="pares-hint">
            🔗 <strong>Cómo responder:</strong> Clic en un elemento de la izquierda → luego clic en su par de la derecha.<br>
            🎨 <strong>Las respuestas asociadas comparten el mismo color</strong> (borde + flecha).<br>
            ✏️ Para deshacer una conexión, clic sobre la flecha o sobre el elemento izquierdo ya conectado.
          </div>
          <div class="pares-wrap" id="paresWrap_${idx}">
            <div class="pares-col-izq" id="colIzq_${idx}">${izqHtml}</div>
            <div class="pares-svg-area" id="svgArea_${idx}">
              <svg id="svgLines_${idx}"></svg>
            </div>
            <div class="pares-col-der" id="colDer_${idx}">${derHtml}</div>
          </div>
          <button class="pares-reset" onclick="resetPares(${idx})">🗑️ Borrar todas las conexiones</button>`;
      } else {
        // ── Original multiple choice / single choice ──
        const esMulti = Array.isArray(item.correcta);
        const inputType = esMulti ? 'checkbox' : 'radio';
        // Shuffle options
        const opts = item.opciones.map((t, i) => ({ t, i }));
        for (let i = opts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [opts[i], opts[j]] = [opts[j], opts[i]]; }
        item._shuffled = opts;
        item._shuffledCorrecta = esMulti ? item.correcta.map(c => opts.findIndex(o => o.i === c)) : opts.findIndex(o => o.i === item.correcta);

        let optsHtml = esMulti ? '<p class="multi-hint">📌 Seleccione ' + item.correcta.length + ' respuestas</p>' : '';
        opts.forEach((o, i) => { optsHtml += `<div class="opcion"><label><input type="${inputType}" name="p${idx}" value="${i}" onchange="updateProgress()"><span>${o.t}</span></label></div>`; });
        const imgHtml = item.imagen ? `<img src="${item.imagen}" alt="Imagen">` : '';

        div.innerHTML = `<div class="pregunta-num">${idx + 1}</div><h3>${item.pregunta}</h3>${imgHtml}${optsHtml}`;
      }

      container.appendChild(div);
    });

    // Stagger animation delay per question
    container.querySelectorAll('.pregunta').forEach((el, i) => {
      el.style.animationDelay = (i * 80) + 'ms';
    });

    // Apply anti-AI zero-width characters after rendering
    setTimeout(applyAntiAI, 100);
  }

  // ── Click-to-connect arrows for Pares ──
  let paresSelIzq = null; // { pregIdx, izqIdx }

  function clickIzq(pregIdx, izqIdx) {
    const item = examenData.preguntas[pregIdx];
    // If already selected same, deselect
    if (paresSelIzq && paresSelIzq.pregIdx === pregIdx && paresSelIzq.izqIdx === izqIdx) {
      paresSelIzq = null;
      document.querySelectorAll(`#colIzq_${pregIdx} .par-btn`).forEach(b => b.classList.remove('selected'));
      return;
    }
    // If this izq already has a connection, remove it first
    if (item._conexiones[izqIdx] !== undefined) {
      delete item._conexiones[izqIdx];
      redrawLines(pregIdx);
    }
    // Select this izq
    paresSelIzq = { pregIdx, izqIdx };
    document.querySelectorAll(`#colIzq_${pregIdx} .par-btn`).forEach(b => b.classList.remove('selected'));
    document.getElementById(`izq_${pregIdx}_${izqIdx}`).classList.add('selected');
  }

  function clickDer(pregIdx, derIdx) {
    const item = examenData.preguntas[pregIdx];
    if (!paresSelIzq || paresSelIzq.pregIdx !== pregIdx) {
      // No izq selected — if this der is connected, remove that connection
      const existingIzq = Object.keys(item._conexiones).find(k => item._conexiones[k] === derIdx);
      if (existingIzq !== undefined) {
        delete item._conexiones[existingIzq];
        redrawLines(pregIdx);
        updateProgress();
      }
      return;
    }
    // Remove any existing connection to this der
    const existingIzq = Object.keys(item._conexiones).find(k => item._conexiones[k] === derIdx);
    if (existingIzq !== undefined) delete item._conexiones[existingIzq];

    // Connect
    item._conexiones[paresSelIzq.izqIdx] = derIdx;
    paresSelIzq = null;
    document.querySelectorAll(`#colIzq_${pregIdx} .par-btn`).forEach(b => b.classList.remove('selected'));
    redrawLines(pregIdx);
    updateProgress();
  }

  // ── Color palette for pairs ──
  const PARES_COLORS = [
    { border: '#60a5fa', bg: 'rgba(96,165,250,0.12)', glow: 'rgba(96,165,250,0.3)'  },  // blue
    { border: '#34d399', bg: 'rgba(52,211,153,0.12)', glow: 'rgba(52,211,153,0.3)'  },  // green
    { border: '#f472b6', bg: 'rgba(244,114,182,0.12)', glow: 'rgba(244,114,182,0.3)' }, // pink
    { border: '#fb923c', bg: 'rgba(251,146,60,0.12)', glow: 'rgba(251,146,60,0.3)'  },  // orange
    { border: '#a78bfa', bg: 'rgba(167,139,250,0.12)', glow: 'rgba(167,139,250,0.3)' }, // purple
    { border: '#facc15', bg: 'rgba(250,204,21,0.12)', glow: 'rgba(250,204,21,0.3)'  },  // yellow
    { border: '#22d3ee', bg: 'rgba(34,211,238,0.12)', glow: 'rgba(34,211,238,0.3)'  },  // cyan
    { border: '#f87171', bg: 'rgba(248,113,113,0.12)', glow: 'rgba(248,113,113,0.3)' }, // red
  ];

  function redrawLines(pregIdx) {
    const item = examenData.preguntas[pregIdx];
    const svgEl = document.getElementById(`svgLines_${pregIdx}`);
    const svgArea = document.getElementById(`svgArea_${pregIdx}`);
    if (!svgEl || !svgArea) return;

    svgEl.innerHTML = '';
    const areaRect = svgArea.getBoundingClientRect();

    // Reset all button styles first
    const pares = item.pares || [];
    pares.forEach((_, pi) => {
      const btn = document.getElementById(`izq_${pregIdx}_${pi}`);
      if (btn) { btn.style.borderColor = ''; btn.style.background = ''; btn.style.boxShadow = ''; btn.style.color = ''; }
    });
    (item._derShuffled || []).forEach((_, di) => {
      const btn = document.getElementById(`der_${pregIdx}_${di}`);
      if (btn) { btn.style.borderColor = ''; btn.style.background = ''; btn.style.boxShadow = ''; btn.style.color = ''; }
    });

    // Assign a color index per izqIdx (order of connection)
    const colorMap = {}; // izqIdx → colorIdx
    let colorIdx = 0;
    Object.keys(item._conexiones).forEach(izqIdx => {
      colorMap[izqIdx] = colorIdx % PARES_COLORS.length;
      colorIdx++;
    });

    // Apply colors and draw lines
    Object.entries(item._conexiones).forEach(([izqIdx, derIdx]) => {
      const ci = colorMap[izqIdx];
      const col = PARES_COLORS[ci];

      const izqEl = document.getElementById(`izq_${pregIdx}_${izqIdx}`);
      const derEl = document.getElementById(`der_${pregIdx}_${derIdx}`);
      if (!izqEl || !derEl) return;

      // Color the buttons
      izqEl.style.borderColor = col.border;
      izqEl.style.background = col.bg;
      izqEl.style.boxShadow = `0 0 12px ${col.glow}`;
      izqEl.style.color = '#f8fafc';
      derEl.style.borderColor = col.border;
      derEl.style.background = col.bg;
      derEl.style.boxShadow = `0 0 12px ${col.glow}`;
      derEl.style.color = '#f8fafc';

      // Draw curved line
      const izqRect = izqEl.getBoundingClientRect();
      const derRect = derEl.getBoundingClientRect();
      const x1 = izqRect.right - areaRect.left;
      const y1 = izqRect.top + izqRect.height / 2 - areaRect.top;
      const x2 = derRect.left - areaRect.left;
      const y2 = derRect.top + derRect.height / 2 - areaRect.top;
      const cx = (x1 + x2) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
      path.setAttribute('stroke', col.border);
      path.setAttribute('stroke-width', '2.5');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-linecap', 'round');
      path.style.cursor = 'pointer';
      path.style.pointerEvents = 'stroke';
      path.addEventListener('click', () => {
        delete item._conexiones[izqIdx];
        redrawLines(pregIdx);
        updateProgress();
      });

      // Arrow head
      const angle = Math.atan2(y2 - y1, x2 - x1);
      const aw = 8;
      const ax1 = x2 - aw * Math.cos(angle - 0.4);
      const ay1 = y2 - aw * Math.sin(angle - 0.4);
      const ax2 = x2 - aw * Math.cos(angle + 0.4);
      const ay2 = y2 - aw * Math.sin(angle + 0.4);
      const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      arrow.setAttribute('points', `${x2},${y2} ${ax1},${ay1} ${ax2},${ay2}`);
      arrow.setAttribute('fill', col.border);
      arrow.style.cursor = 'pointer';
      arrow.style.pointerEvents = 'all';
      arrow.addEventListener('click', () => {
        delete item._conexiones[izqIdx];
        redrawLines(pregIdx);
        updateProgress();
      });

      svgEl.appendChild(path);
      svgEl.appendChild(arrow);
    });
  }

  function resetPares(pregIdx) {
    const item = examenData.preguntas[pregIdx];
    item._conexiones = {};
    paresSelIzq = null;
    document.querySelectorAll(`#colIzq_${pregIdx} .par-btn`).forEach(b => { b.classList.remove('selected','connected'); });
    document.querySelectorAll(`#colDer_${pregIdx} .par-btn`).forEach(b => { b.classList.remove('connected'); });
    redrawLines(pregIdx);
    updateProgress();
  }

  // Release session on page close/leave
  window.addEventListener('beforeunload', () => {
    if (currentUser && examenId) liberarSesion(currentUser.id, examenId);
  });

  // Redraw lines on scroll/resize (positions change)
  window.addEventListener('resize', () => {
    if (!examenData) return;
    examenData.preguntas.forEach((item, idx) => {
      if (item.tipo === 'pares') redrawLines(idx);
    });
  });

  function updateProgress() {
    const respondidas = contarRespondidas();
    const total = examenData ? examenData.preguntas.length : 0;
    document.getElementById('respondidas').textContent = respondidas;
    document.getElementById('progressBar').style.width = total ? Math.round(respondidas / total * 100) + '%' : '0%';
    // Update nav dots
    if (!examenData) return;
    examenData.preguntas.forEach((item, i) => {
      const dot = document.getElementById(`dot_${i}`);
      if (!dot) return;
      let respondida = false;
      if (item.tipo === 'pares') {
        respondida = Object.keys(item._conexiones || {}).length > 0;
      } else {
        const esMulti = Array.isArray(item.correcta);
        respondida = esMulti ? (item._userAnswers || []).length > 0 : item._userAnswer !== undefined;
      }
      dot.classList.toggle('respondida', respondida);
    });
    const navRes = document.getElementById('navRespondidas');
    if (navRes) navRes.textContent = respondidas + ' respondidas';
  }

  function cargarPreguntas() { /* replaced by mostrarPregunta */ }

  async function finalizar() {
    clearInterval(timer);

    // Release session lock — skip in preview
    if (currentUser && !isPreview) await liberarSesion(currentUser.id, examenId);
    let correctas = 0;
    let puntosObtenidos = 0;
    let puntosTotales = 0;

    examenData.preguntas.forEach((item, idx) => {
      const puntosPreg = item.puntos || 1;
      puntosTotales += puntosPreg;
      let acerto = false;

      if (item.tipo === 'pares') {
        const conexiones = item._conexiones || {};
        acerto = (item.pares || []).every((par, pi) => {
          const derShuffledIdx = conexiones[pi];
          if (derShuffledIdx === undefined) return false;
          return item._derShuffled[derShuffledIdx]?.origIdx === pi;
        });
      } else if (item.tipo === 'imagen') {
        acerto = item._userAnswer !== undefined && item._userAnswer === item._shuffledCorrectaImg;
      } else if (item.tipo === 'numerico') {
        const userVal = item._userNumeric || '';
        // Parse fraction like 1/2
        let userNum;
        if (userVal.includes('/')) {
          const parts = userVal.split('/');
          userNum = parseFloat(parts[0]) / parseFloat(parts[1]);
        } else {
          userNum = parseFloat(userVal);
        }
        const correctNum = parseFloat(item.respuesta);
        const tol = parseFloat(item.tolerancia) || 0;
        acerto = !isNaN(userNum) && !isNaN(correctNum) && Math.abs(userNum - correctNum) <= tol;
      } else {
        const esMulti = Array.isArray(item.correcta);
        if (esMulti) {
          const checked = (item._userAnswers || []).slice().sort();
          const correct = (Array.isArray(item._shuffledCorrecta) ? item._shuffledCorrecta : []).slice().sort();
          acerto = checked.length === correct.length && checked.every((v, i) => v === correct[i]);
        } else {
          acerto = item._userAnswer !== undefined && item._userAnswer === item._shuffledCorrecta;
        }
      }

      if (acerto) { correctas++; puntosObtenidos += puntosPreg; }
    });

    // Calculate final grade based on scale
    const notaMaxima = examenData.notaMaxima || 100;
    const notaFinal = Math.round((puntosObtenidos / puntosTotales) * notaMaxima * 100) / 100;
    const nota = notaFinal;
    const aprobado = nota >= (examenData.notaMinima || (notaMaxima * 0.7));

    // Save to Firebase — skip in preview mode
    if (currentUser && !isPreview) {
      await saveGrade({ examenId, examenTitulo: examenData.titulo, userId: currentUser.id, username: currentUser.username, nombre: currentUser.nombre, nota, totalPreguntas: examenData.preguntas.length, correctas, aprobado, createdBy: examenData.createdBy||'', puntosObtenidos, puntosTotales, notaMaxima });
    }

    document.getElementById('secExamen').classList.add('hidden');
    document.getElementById('secResultado').classList.remove('hidden');

    // ── Multimedia del resultado ──
    const imgResultado = aprobado ? (examenData.imgAprobado || '') : (examenData.imgReprobado || '');
    const imgHTML = imgResultado
      ? `<img src="${imgResultado}" alt="${aprobado?'Aprobado':'Reprobado'}" style="width:100%;max-width:420px;border-radius:16px;margin:20px auto 8px;display:block;box-shadow:0 8px 30px rgba(0,0,0,0.4);">`
      : '';

    document.getElementById('secResultado').innerHTML = `<div class="resultado ${aprobado?'aprobado':'reprobado'}"><h2>${aprobado?'🎉 ¡Aprobó!':'😔 Reprobó'}</h2><p style="color:#94a3b8;">Estudiante: <strong style="color:#f1f5f9;">${currentUser?currentUser.nombre:'—'}</strong></p><div class="nota-badge">${nota} / ${notaMaxima}</div><p style="color:#94a3b8;margin-top:8px;">Correctas: ${correctas} de ${examenData.preguntas.length} | Puntos: ${puntosObtenidos}/${puntosTotales}</p>${imgHTML}<div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"><button id="btnDescargarPDF" class="btn btn-primary" style="padding:10px 20px;font-size:0.85rem;">📄 Descargar PDF</button></div><p style="color:#64748b;margin-top:12px;font-size:0.8rem;">${currentUser&&currentUser.email?'📧 Se envió un resumen a '+currentUser.email:''}  </p></div>`;

    // ── Audio del resultado ──
    // Stop exam music if playing
    try {
      if (window._audioExamen) {
        window._audioExamen.pause();
        window._audioExamen.currentTime = 0;
      }
    } catch(e) {}
    const audioUrl = aprobado ? (examenData.audioAprobado || '') : (examenData.audioReprobado || '');
    if (audioUrl) {
      try {
        const audio = new Audio(audioUrl);
        audio.volume = 0.6;
        audio.play().catch(() => {});
        window._audioResultado = audio;
      } catch(e) {}
    }
    // Attach async PDF handler after DOM is set
    setTimeout(() => {
      const btnPDF = document.getElementById('btnDescargarPDF');
      if (btnPDF) btnPDF.addEventListener('click', async () => {
        btnPDF.disabled = true;
        btnPDF.textContent = '⏳ Generando PDF...';
        await generarPDF(nota, correctas, aprobado);
        btnPDF.disabled = false;
        btnPDF.textContent = '📄 Descargar PDF';
      });
    }, 50);

    // Send email with PDF link — skip in preview
    if (!isPreview) await enviarEmail(nota, correctas, aprobado);
  }

  // ── Helper: convert image URL to base64 for PDF ──
  // Tries fetch+blob->FileReader first (better for CORS-handled endpoints),
  // then falls back to Image+canvas. Returns null on failure.
  async function imgToBase64(url) {
    if (!url) return null;
    try {
      if (String(url).startsWith('data:')) return url; // already base64

      // Try fetch -> blob -> FileReader (works when server allows CORS)
      try {
        const resp = await fetch(url);
        if (resp && resp.ok) {
          const blob = await resp.blob();
          return await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(blob);
          });
        }
      } catch (fetchErr) {
        console.warn('imgToBase64 fetch failed for', url, fetchErr);
      }

      // Fallback: load image into canvas (may fail if cross-origin not allowed)
      return await new Promise((resolve) => {
        try {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = function() {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = img.naturalWidth || img.width || 1;
              canvas.height = img.naturalHeight || img.height || 1;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0);
              resolve(canvas.toDataURL('image/png'));
            } catch(e) { resolve(null); }
          };
          img.onerror = function() { resolve(null); };
          // cache-buster to mitigate stale CORS cached responses
          img.src = url + (url.indexOf('?') === -1 ? '?_=' + Date.now() : '&_=' + Date.now());
        } catch(e) { resolve(null); }
      });
    } catch (e) {
      console.error('imgToBase64 unexpected error:', e);
      return null;
    }
  }

  function getImageTypeFromDataUrl(dataUrl) {
    if (!dataUrl || typeof dataUrl !== 'string') return 'PNG';
    if (dataUrl.startsWith('data:image/png')) return 'PNG';
    if (dataUrl.startsWith('data:image/jpeg') || dataUrl.startsWith('data:image/jpg')) return 'JPEG';
    if (dataUrl.startsWith('data:image/gif')) return 'GIF';
    if (dataUrl.startsWith('data:image/webp')) return 'WEBP';
    return 'PNG';
  }

  async function generarPDF(nota, correctas, aprobado) {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const fecha = new Date().toLocaleString('es-ES');
      const nombre = currentUser ? currentUser.nombre : 'Estudiante';
      const status = aprobado ? 'APROBADO' : 'REPROBADO';

      // Pre-load all question images as base64
      const imgCache = {};
      for (const item of examenData.preguntas) {
        if (item.imagen && item.imagen.trim()) {
          imgCache[item.imagen] = await imgToBase64(item.imagen);
        }
        if (item.tipo === 'imagen' && Array.isArray(item.opciones)) {
          for (const opt of item.opciones) {
            if (opt && opt.imagen && opt.imagen.trim()) {
              imgCache[opt.imagen] = await imgToBase64(opt.imagen);
            }
          }
        }
      }

      // Debug: report which images failed to convert (temporary)
      try {
        const failed = Object.keys(imgCache).filter(k => !imgCache[k]);
        if (failed.length) console.warn('PDF image conversion failed for:', failed);
        else console.log('All question images converted to base64 for PDF.');
        console.log('imgCache summary:', Object.keys(imgCache).map(k => ({ url: k, ok: !!imgCache[k] })));
      } catch(e) { console.error('Error logging imgCache:', e); }

      // Header
      const institucion = examenData.institucion || currentUser.institucion || 'Evaluacion Digital';
      doc.setFontSize(18);
      doc.setFont('helvetica', 'bold');
      doc.text(institucion, 105, 20, { align: 'center' });
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text('Comprobante de evaluacion', 105, 27, { align: 'center' });

      // Line
      doc.setDrawColor(0, 120, 212);
      doc.setLineWidth(0.5);
      doc.line(20, 32, 190, 32);

      // Info
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.text('COMPROBANTE DE EXAMEN', 20, 42);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text('Estudiante: ' + nombre, 20, 52);
      doc.text('Curso: ' + (currentUser.curso || 'Sin curso'), 20, 58);
      doc.text('Profesor: ' + (examenData.createdByName || 'No especificado'), 20, 64);
      doc.text('Institucion: ' + (examenData.institucion || currentUser.institucion || 'No especificada'), 20, 70);
      doc.text('Examen: ' + (examenData.titulo || 'Sin titulo'), 20, 76);
      doc.text('Fecha: ' + fecha, 20, 82);
      doc.text('Nota: ' + nota + '/' + (examenData.notaMaxima || 100) + ' — ' + status, 20, 88);
      doc.text('Preguntas correctas: ' + correctas + ' de ' + examenData.preguntas.length, 20, 94);

      // Line
      doc.line(20, 99, 190, 99);

      // Questions detail
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.text('DETALLE DE RESPUESTAS', 20, 107);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(100, 100, 100);
      doc.text('(CORRECTA = respuesta acertada | INCORRECTA = respuesta errada)', 20, 113);

      let y = 122;
      examenData.preguntas.forEach((item, idx) => {
        if (y > 260) { doc.addPage(); y = 20; }

        let respuestaUsuario = '';
        let respuestaCorrecta = '';
        let esCorrecta = false;

        if (item.tipo === 'pares') {
          const conexiones = item._conexiones || {};
          const pares = item.pares || [];
          esCorrecta = pares.every((par, pi) => {
            const derShuffledIdx = conexiones[pi];
            if (derShuffledIdx === undefined) return false;
            return item._derShuffled[derShuffledIdx]?.origIdx === pi;
          });
          respuestaUsuario = pares.map((par, pi) => {
            const derShuffledIdx = conexiones[pi];
            const der = derShuffledIdx !== undefined ? (item._derShuffled[derShuffledIdx]?.text || '?') : 'Sin respuesta';
            return par.izq + ' → ' + der;
          }).join(' | ');
          respuestaCorrecta = pares.map(p => p.izq + ' → ' + p.der).join(' | ');
        } else if (item.tipo === 'imagen') {
          esCorrecta = item._userAnswer !== undefined && item._userAnswer === item._shuffledCorrectaImg;
          const selOpt = item._shuffledImg ? item._shuffledImg[item._userAnswer] : null;
          respuestaUsuario = selOpt ? (selOpt.texto || 'Opción ' + (item._userAnswer + 1)) : 'Sin respuesta';
          const corrOpt = item.opciones ? item.opciones[item.correcta] : null;
          respuestaCorrecta = corrOpt ? (corrOpt.texto || 'Opción ' + (item.correcta + 1)) : '?';
        } else if (item.tipo === 'numerico') {
          const userVal = item._userNumeric || '';
          let userNum;
          if (userVal.includes('/')) { const p = userVal.split('/'); userNum = parseFloat(p[0]) / parseFloat(p[1]); }
          else { userNum = parseFloat(userVal); }
          const correctNum = parseFloat(item.respuesta);
          const tol = parseFloat(item.tolerancia) || 0;
          esCorrecta = !isNaN(userNum) && !isNaN(correctNum) && Math.abs(userNum - correctNum) <= tol;
          respuestaUsuario = userVal || 'Sin respuesta';
          respuestaCorrecta = String(item.respuesta) + (tol > 0 ? ' (±' + tol + ')' : '');
        } else {
          const esMulti = Array.isArray(item.correcta);
          if (esMulti) {
            const checked = item._userAnswers || [];
            respuestaUsuario = checked.map(i => item._shuffled[i]?.t || '?').join(', ') || 'Sin respuesta';
            respuestaCorrecta = item.correcta.map(i => item.opciones[i]).join(', ');
            const correct = (Array.isArray(item._shuffledCorrecta) ? item._shuffledCorrecta : []).slice().sort();
            esCorrecta = checked.slice().sort().length === correct.length && checked.slice().sort().every((v, i) => v === correct[i]);
          } else {
            respuestaUsuario = item._userAnswer !== undefined ? (item._shuffled[item._userAnswer]?.t || '?') : 'Sin respuesta';
            respuestaCorrecta = item.opciones[item.correcta];
            esCorrecta = item._userAnswer !== undefined && item._userAnswer === item._shuffledCorrecta;
          }
        }
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(0, 0, 0);
        doc.text((idx+1) + '. ' + item.pregunta.substring(0, 95), 20, y);
        y += 5;

        // Thumbnail if question has image
        if (item.imagen && imgCache[item.imagen]) {
          try {
            const thumbH = 22;
            const thumbW = 30;
            if (y + thumbH > 265) { doc.addPage(); y = 20; }
            const imgType = getImageTypeFromDataUrl(imgCache[item.imagen]);
            doc.addImage(imgCache[item.imagen], imgType, 22, y, thumbW, thumbH);
            y += thumbH + 3;
          } catch(imgErr) { /* skip if image fails */ }
        }

        // Option images for image-based questions
        if (item.tipo === 'imagen' && Array.isArray(item.opciones)) {
          try {
            const imgs = item.opciones
              .filter(opt => opt && opt.imagen && imgCache[opt.imagen])
              .map(opt => ({ url: opt.imagen, data: imgCache[opt.imagen] }));
            if (imgs.length > 0) {
              const imgW = 36;
              const imgH = 26;
              const gap = 4;
              let x = 22;
              if (y + imgH > 265) { doc.addPage(); y = 20; }
              for (let i = 0; i < imgs.length; i++) {
                const imgType = getImageTypeFromDataUrl(imgs[i].data);
                doc.addImage(imgs[i].data, imgType, x, y, imgW, imgH);
                x += imgW + gap;
                if (x + imgW > 188) {
                  x = 22;
                  y += imgH + gap;
                  if (y + imgH > 265) { doc.addPage(); y = 20; }
                }
              }
              y += imgH + 5;
            }
          } catch(imgErr) { /* skip if option image fails */ }
        }

        // Result label: CORRECTA or INCORRECTA
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        if (esCorrecta) {
          doc.setTextColor(0, 150, 0);
          doc.text('   CORRECTA', 20, y);
        } else {
          doc.setTextColor(200, 0, 0);
          doc.text('   INCORRECTA', 20, y);
        }
        y += 5;

        // What the student answered
        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(60, 60, 60);
        doc.text('   Tu respuesta: ' + respuestaUsuario.substring(0, 85), 20, y);
        y += 4;

        // If incorrect, show the correct answer
        if (!esCorrecta) {
          doc.setTextColor(0, 100, 0);
          doc.text('   Respuesta correcta: ' + respuestaCorrecta.substring(0, 85), 20, y);
          y += 4;
        }

        // Separator
        doc.setDrawColor(200, 200, 200);
        doc.setLineWidth(0.1);
        doc.line(20, y + 1, 190, y + 1);
        y += 5;

        doc.setTextColor(0, 0, 0);
        y += 3;
      });

      // Footer
      doc.setFontSize(8);
      doc.setTextColor(128, 128, 128);
      doc.text('Documento generado automáticamente por Evaluación Digital — ' + fecha, 105, 290, { align: 'center' });

      // Download
      doc.save('Examen_' + nombre.replace(/\s/g, '_') + '_' + nota + '.pdf');
    } catch(e) {
      console.error('Error generando PDF:', e);
    }
  }

  async function enviarEmail(nota, correctas, aprobado) {
    try {
      const emailDest = currentUser ? currentUser.email : '';
      if (!emailDest) {
        console.log('Sin email — no se envia correo');
        return;
      }

      // ── Generate PDF and upload to Firebase Storage ──
      let pdfUrl = null;
      try {
        const pdfBlob = await generarPDFBlob(nota, correctas, aprobado);
        if (pdfBlob) {
          const nombre = currentUser.nombre || currentUser.username || 'estudiante';
          const fecha = Date.now();
          const fileName = 'resultados/' + (currentUser.id || 'u') + '_' + fecha + '.pdf';
          const storageRef = firebase.storage().ref().child(fileName);
          const snapshot = await storageRef.put(pdfBlob, { contentType: 'application/pdf' });
          pdfUrl = await snapshot.ref.getDownloadURL();
        }
      } catch(storageErr) {
        console.warn('No se pudo subir PDF:', storageErr.message);
      }

      // ── Send email with PDF link ──
      emailjs.send('service_i7gv5pq', 'template_gi85ryj', {
        to_email: emailDest,
        email: emailDest,
        student_name: currentUser.nombre || currentUser.username,
        exam_name: examenData.titulo || 'Examen',
        date: new Date().toLocaleString('es-ES'),
        score: String(nota),
        status: aprobado ? 'APROBADO' : 'REPROBADO',
        correct: String(correctas),
        total: String(examenData.preguntas.length),
        pdf_url: pdfUrl ? '📄 Descarga tu comprobante PDF: ' + pdfUrl + ' — ⚠️ Este link estará disponible por 48 horas. Descárgalo antes de que expire.' : 'El comprobante está disponible en la plataforma.'
      }).then(function(response) {
        console.log('Email enviado OK:', response);
        // Update result screen to show email was sent with PDF
        const emailNote = document.querySelector('#secResultado p[style*="color:#64748b"]');
        if (emailNote && pdfUrl) {
          emailNote.innerHTML = '📧 Se envió un resumen con link al PDF a ' + emailDest;
        }
      }).catch(function(err) {
        console.error('Error enviando email:', err);
      });
    } catch(e) {
      console.error('Error con EmailJS:', e);
    }
  }

      doc.setFontSize(10); doc.setFont('helvetica', 'normal');
      doc.text('Estudiante: ' + nombre, 20, 50);

      doc.text('Fecha: ' + fecha, 20, 64);
      doc.text('Nota: ' + nota + ' / ' + notaMaxima + ' — ' + status, 20, 71);
      doc.text('Correctas: ' + correctas + ' de ' + examenData.preguntas.length, 20, 78);
      doc.line(20,83,190,83);

      doc.setFontSize(8); doc.setTextColor(128,128,128);

  }

  // ── Dark/Light mode ──
  function toggleDarkMode() {
    const isLight = document.body.classList.toggle('light-mode');
    localStorage.setItem('colorMode', isLight ? 'light' : 'dark');
    const btn = document.getElementById('darkToggle');
    if (btn) btn.textContent = isLight ? '☀️' : '🌙';
  }
  (function() {
    if (localStorage.getItem('colorMode') === 'light') {
      document.body.classList.add('light-mode');
      const btn = document.getElementById('darkToggle');
      if (btn) btn.textContent = '☀️';
    }
  })();
