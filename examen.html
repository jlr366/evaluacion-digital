<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="logo_evaluacion_digital_transparente.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examen en Línea</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #060d1a; color: #e2e8f0; min-height: 100vh; -webkit-user-select: none; user-select: none; }
    input, textarea, select, label, .opcion { -webkit-user-select: text !important; user-select: text !important; }
    input[type="radio"], input[type="checkbox"] { -webkit-appearance: auto !important; appearance: auto !important; pointer-events: auto !important; width: 18px; height: 18px; accent-color: #0078d4; cursor: pointer; flex-shrink: 0; }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0,120,212,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,120,212,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 860px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; }

    /* ── Sticky timer bar ── */
    .timer-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(6,13,26,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,120,212,0.3);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 2px 20px rgba(0,120,212,0.15);
    }

    .timer-bar .brand { font-size: 0.85rem; font-weight: 700; color: #60a5fa; display: flex; align-items: center; gap: 6px; }
    .timer-bar .brand img { height: 28px; filter: brightness(1.2); }

    .timer-center { display: flex; align-items: center; gap: 10px; }

    .timer-display {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 6px 16px;
      font-size: 1.2rem;
      font-weight: 900;
      color: #f87171;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    .timer-display .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

    .timer-warning { color: #f59e0b !important; border-color: rgba(245,158,11,0.4) !important; background: rgba(245,158,11,0.1) !important; }
    .timer-critical { color: #ef4444 !important; border-color: rgba(239,68,68,0.6) !important; background: rgba(239,68,68,0.15) !important; animation: blink 0.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.6} }

    .progress-wrap { flex: 1; max-width: 200px; }
    .progress-label { font-size: 0.72rem; color: #64748b; margin-bottom: 4px; text-align: right; }
    .progress-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #0078d4, #00bcf2); border-radius: 3px; transition: width 0.4s; }

    /* ── Exam header ── */
    .exam-header {
      margin-top: 70px;
      margin-bottom: 28px;
      background: linear-gradient(135deg, rgba(0,120,212,0.08), rgba(0,188,242,0.04));
      border: 1px solid rgba(0,120,212,0.2);
      border-radius: 16px;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }

    .exam-header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,120,212,0.12), transparent 70%);
    }

    .exam-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(0,120,212,0.15);
      border: 1px solid rgba(0,120,212,0.3);
      color: #60a5fa;
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .exam-header h1 {
      font-size: 1.7rem;
      font-weight: 900;
      color: #f8fafc;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .exam-header .sub { color: #94a3b8; font-size: 0.88rem; text-align: left; }

    /* ── Card ── */
    .card {
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(148,163,184,0.1);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
    }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 16px; background: #060d1a; border: 1px solid #334155; border-radius: 10px; color: #f1f5f9; font-size: 0.95rem; transition: 0.2s; }
    .form-group input:focus { outline: none; border-color: #0078d4; box-shadow: 0 0 0 3px rgba(0,120,212,0.15); }

    /* ── Buttons ── */
    .btn { padding: 12px 24px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg, #0078d4, #005a9e); color: white; box-shadow: 0 4px 14px rgba(0,120,212,0.3); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 4px 14px rgba(239,68,68,0.25); }

    /* ── Questions ── */
    .pregunta {
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(0,120,212,0.15);
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 16px;
      transition: 0.2s;
      position: relative;
    }

    .pregunta:hover { border-color: rgba(0,120,212,0.3); box-shadow: 0 0 20px rgba(0,120,212,0.08); }

    .pregunta-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #0078d4, #005a9e);
      color: white;
      font-size: 0.78rem;
      font-weight: 900;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,120,212,0.3);
    }

    .pregunta h3 { font-size: 0.95rem; font-weight: 600; color: #f1f5f9; line-height: 1.6; margin-bottom: 16px; }
    .pregunta img { max-width: 100%; border-radius: 10px; margin-bottom: 14px; border: 1px solid rgba(0,120,212,0.2); }

    .opcion {
      margin: 6px 0;
      padding: 11px 16px;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.08);
      cursor: pointer;
      transition: 0.15s;
      touch-action: manipulation;
      background: rgba(30,41,59,0.5);
    }

    .opcion:hover { background: rgba(0,120,212,0.1); border-color: rgba(0,120,212,0.3); }
    .opcion label { display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 0.88rem; color: #cbd5e1; }

    /* ── Result ── */
    .resultado { text-align: center; padding: 40px 28px; border-radius: 16px; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .resultado.aprobado { background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(6,182,212,0.04)); border: 1px solid rgba(16,185,129,0.3); }
    .resultado.reprobado { background: linear-gradient(135deg, rgba(239,68,68,0.08), rgba(244,63,94,0.04)); border: 1px solid rgba(239,68,68,0.3); }
    .resultado h2 { font-size: 1.8rem; margin-bottom: 12px; font-weight: 900; }
    .resultado.aprobado h2 { color: #34d399; }
    .resultado.reprobado h2 { color: #f87171; }
    .nota-badge { display: inline-block; padding: 10px 28px; border-radius: 30px; font-size: 1.6rem; font-weight: 900; margin: 16px 0; }
    .resultado.aprobado .nota-badge { background: rgba(16,185,129,0.15); color: #34d399; border: 2px solid rgba(16,185,129,0.3); }
    .resultado.reprobado .nota-badge { background: rgba(239,68,68,0.15); color: #f87171; border: 2px solid rgba(239,68,68,0.3); }

    .hidden { display: none !important; }
    .msg { padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 0.85rem; }
    .msg-err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .multi-hint { font-size: 0.75rem; color: #60a5fa; margin-bottom: 10px; font-weight: 600; background: rgba(0,120,212,0.08); padding: 6px 10px; border-radius: 6px; display: inline-block; }

    @media (max-width: 768px) {
      .timer-bar { padding: 8px 14px; }
      .timer-display { font-size: 1rem; padding: 5px 12px; }
      .progress-wrap { display: none; }
      .exam-header { padding: 20px; margin-top: 60px; }
      .exam-header h1 { font-size: 1.3rem; }
    }

    /* ── Flechas / Pares ── */
    .pares-wrap {
      margin-top: 14px;
      display: flex;
      gap: 0;
      align-items: stretch;
      position: relative;
    }
    .pares-col-izq, .pares-col-der {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }
    .pares-svg-area {
      width: 120px;
      flex-shrink: 0;
      position: relative;
    }
    .pares-svg-area svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: visible;
      pointer-events: none;
    }
    .par-btn {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #f1f5f9;
      cursor: pointer;
      border: 2px solid rgba(148,163,184,0.25);
      background: rgba(30,41,59,0.6);
      text-align: center;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      user-select: none;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .par-btn:hover { border-color: rgba(148,163,184,0.5); background: rgba(30,41,59,0.9); }
    .par-btn.selected {
      border-color: #f59e0b !important;
      background: rgba(245,158,11,0.15) !important;
      color: #fbbf24 !important;
      box-shadow: 0 0 14px rgba(245,158,11,0.35) !important;
    }
    .pares-hint {
      font-size:0.78rem; color:#94a3b8; margin-bottom:10px;
      background:rgba(15,23,42,0.6); padding:8px 12px; border-radius:8px;
      display:block; border: 1px solid rgba(148,163,184,0.1);
      line-height: 1.6;
    }
    .pares-hint strong { color: #f1f5f9; }
    .pares-reset { margin-top:10px; padding:6px 14px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171; border-radius:8px; font-size:0.8rem; cursor:pointer; font-weight:600; }
    .pares-reset:hover { background:rgba(239,68,68,0.2); }
  </style>
</head>
<body>

<!-- ── Sticky Timer Bar ── -->
<div id="timerBar" class="timer-bar hidden">
  <div class="brand">
    <img src="logo_evaluacion_digital_transparente.png" alt="Logo" onerror="this.style.display='none'">
    <span id="timerExamTitle" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.8rem;color:#94a3b8;"></span>
  </div>
  <div class="timer-center">
    <div id="timerDisplay" class="timer-display">
      <div class="dot"></div>
      <span id="tiempo">40:00</span>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span id="respondidas">0</span> / <span id="totalPreg">0</span> respondidas</div>
    <div class="progress-bar"><div id="progressBar" class="progress-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="container">
  <!-- Decorative header -->
  <div id="examHeader" style="text-align:center; padding:40px 20px 30px; border-bottom:1px solid rgba(148,163,184,0.12); margin-bottom:24px; position:relative; overflow:hidden;">
    <!-- Clouds -->
    <svg style="position:absolute;top:0;left:0;width:100%;height:80px;pointer-events:none;" viewBox="0 0 960 80" fill="none">
      <ellipse cx="120" cy="50" rx="60" ry="30" fill="rgba(59,130,246,0.06)"/>
      <ellipse cx="350" cy="35" rx="80" ry="35" fill="rgba(6,182,212,0.05)"/>
      <ellipse cx="650" cy="55" rx="70" ry="28" fill="rgba(59,130,246,0.06)"/>
      <ellipse cx="850" cy="40" rx="55" ry="25" fill="rgba(6,182,212,0.04)"/>
    </svg>
    <!-- Badge -->
    <div id="examBadge" style="display:inline-block;padding:6px 16px;border-radius:20px;background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(6,182,212,0.1));border:1px solid rgba(59,130,246,0.25);color:#60a5fa;font-size:0.8rem;font-weight:700;margin-bottom:12px;"></div>
    <h1 id="exTitulo" style="font-size:1.8rem;">Evaluación en Línea</h1>
    <p id="exSubtitulo" style="color:#94a3b8;font-size:0.95rem;">Complete la evaluación dentro del tiempo establecido</p>
  </div>

  <!-- Login -->
  <div id="secLogin">
    <div class="card" style="max-width:420px; margin:0 auto;">
      <div style="text-align:center; margin-bottom:16px;"><img src="logo_evaluacion_digital_transparente.png" alt="Logo" style="height:120px; filter:drop-shadow(0 4px 20px rgba(0,188,242,0.7)) brightness(1.3);"></div>
      <h2 style="text-align:center; font-size:1.1rem; color:#f8fafc; margin-bottom:16px;">Inicie sesión para comenzar</h2>
      <div id="loginMsg"></div>
      <div class="form-group"><label>Usuario</label><input type="text" id="loginUser" placeholder="Su usuario" /></div>
      <div class="form-group"><label>Contraseña</label><input type="password" id="loginPass" placeholder="Su contraseña" /></div>
      <div class="form-group">
        <label>Correo electrónico <span style="font-weight:400;color:#64748b;">(para recibir tu resultado)</span></label>
        <input type="email" id="loginEmail" placeholder="tucorreo@email.com" />
        <label style="display:flex;align-items:center;gap:6px;margin-top:8px;cursor:pointer;font-size:0.82rem;color:#94a3b8;">
          <input type="checkbox" id="sinCorreo" onchange="document.getElementById('loginEmail').disabled=this.checked; document.getElementById('loginEmail').value='';" style="width:16px;height:16px;accent-color:#64748b;">
          No deseo recibir el resultado por correo
        </label>
      </div>
      <div style="text-align:center; margin-top:16px;"><button class="btn btn-primary" onclick="handleLogin()">🚀 Iniciar examen</button></div>
    </div>
  </div>

  <!-- Exam -->
  <div id="secExamen" class="hidden">
    <div id="preguntasContainer"></div>
    <div style="text-align:center; margin-top:24px; margin-bottom:60px;">
      <button class="btn btn-danger" onclick="finalizar()" style="padding:14px 32px; font-size:1rem;">✅ Finalizar examen</button>
    </div>
  </div>

  <!-- Result -->
  <div id="secResultado" class="hidden"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init('orZQk0WGfKhLwMQUX');</script>
<script src="firebase-config.js"></script>
<script>
  // ── Anti-copy & Anti-AI protections ──

  // Block right-click and context menu (mobile long-press too)
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Block copy/cut/paste
  document.addEventListener('copy', e => e.preventDefault());
  document.addEventListener('cut', e => e.preventDefault());

  // Block keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && 'cusCUSaA'.includes(e.key)) { e.preventDefault(); }
    if (e.key === 'F12') e.preventDefault();
    if (e.ctrlKey && e.shiftKey) e.preventDefault();
  });

  // Block drag (prevents drag-to-select on mobile)
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => {
    // Allow selection only in input fields
    if (!e.target.matches('input, textarea')) e.preventDefault();
  });

  // Block long-press on mobile (prevents "Copy" menu)
  document.addEventListener('touchstart', function(e) {
    if (e.target.matches('input, textarea, select, button, label')) return;
    e.target.style.webkitUserSelect = 'none';
    e.target.style.userSelect = 'none';
  }, { passive: true });

  // Block iOS share sheet text selection
  document.addEventListener('touchend', function(e) {
    if (!e.target.matches('input, textarea, select, button, label')) {
      window.getSelection && window.getSelection().removeAllRanges();
    }
  });

  // Detect screenshot attempt on Android (visibility change)
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      // Page went to background - possible screenshot
      document.querySelectorAll('.pregunta h3').forEach(el => {
        el.setAttribute('data-original', el.textContent);
        el.textContent = '[ Contenido oculto — regresa al examen ]';
      });
    } else {
      // Page came back - restore content
      document.querySelectorAll('.pregunta h3').forEach(el => {
        const orig = el.getAttribute('data-original');
        if (orig) { el.textContent = orig; el.removeAttribute('data-original'); }
      });
    }
  });

  // Inject zero-width characters into question text to corrupt AI paste
  function injectZeroWidth(text) {
    const zwc = ['\u200B', '\u200C', '\u200D', '\uFEFF'];
    return text.split('').map((c, i) =>
      i % 4 === 0 ? c + zwc[i % zwc.length] : c
    ).join('');
  }

  // Apply after questions load
  function applyAntiAI() {
    document.querySelectorAll('.pregunta h3, .opcion span').forEach(el => {
      if (!el.getAttribute('data-protected')) {
        el.textContent = injectZeroWidth(el.textContent);
        el.setAttribute('data-protected', '1');
      }
    });
  }

  // Click handler for options
  document.addEventListener('click', function(e) {
    var op = e.target.closest('.opcion');
    if (op && e.target.tagName !== 'INPUT') {
      var inp = op.querySelector('input');
      if (inp) {
        if (inp.type==='radio') { inp.checked=true; }
        else { inp.checked=!inp.checked; }
        inp.dispatchEvent(new Event('change',{bubbles:true}));
      }
    }
  });

  // Get exam ID from URL
  const params = new URLSearchParams(window.location.search);
  const examenId = params.get('id');
  let examenData = null;
  let currentUser = null;
  let currentSesionId = null;
  let tiempoRestante = 2400;
  let timer = null;
  let examenCargado = false;

  if (!examenId) { document.querySelector('.container').innerHTML = '<div class="card" style="text-align:center;"><h2 style="color:#f87171;">❌ No se especificó un examen</h2><p style="color:#94a3b8;">Esta URL necesita un ID de examen válido.</p></div>'; }

  // Load exam info
  (async function() {
    if (!examenId) return;
    try {
      examenData = await getExamen(examenId);
      if (!examenData) {
        document.querySelector('.container').innerHTML = '<div class="card" style="text-align:center;"><h2 style="color:#f87171;">❌ Examen no encontrado</h2><p style="color:#94a3b8;">El ID del examen no es válido o fue eliminado.</p></div>';
        return;
      }
      document.getElementById('exTitulo').textContent = examenData.titulo;
      document.getElementById('exSubtitulo').textContent = examenData.subtitulo || 'Complete la evaluación dentro del tiempo establecido';
      document.getElementById('examBadge').textContent = '☁️ ' + (examenData.subtitulo || examenData.titulo);
      document.title = examenData.titulo;
      tiempoRestante = (examenData.tiempoMinutos || 40) * 60;
      examenCargado = true;
    } catch(err) {
      console.error('Error cargando examen:', err);
      document.querySelector('.container').innerHTML = '<div class="card" style="text-align:center;"><h2 style="color:#f87171;">❌ Error de conexión</h2><p style="color:#94a3b8;">No se pudo conectar con la base de datos. Recargue la página.</p></div>';
    }
  })();

  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); });
  document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); });

  async function handleLogin() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    const emailInput = document.getElementById('loginEmail').value.trim();
    const sinCorreo = document.getElementById('sinCorreo').checked;
    if (!u||!p) { document.getElementById('loginMsg').innerHTML='<div class="msg msg-err">⚠️ Ingrese usuario y contraseña</div>'; return; }
    if (!sinCorreo && !emailInput) { document.getElementById('loginMsg').innerHTML='<div class="msg msg-err">⚠️ Ingrese su correo o marque "sin correo"</div>'; return; }

    if (!examenCargado) {
      document.getElementById('loginMsg').innerHTML='<div class="msg msg-err">⏳ El examen aún está cargando. Espere un momento.</div>';
      return;
    }

    document.getElementById('loginMsg').innerHTML='<div style="padding:10px;border-radius:8px;margin-bottom:14px;font-size:0.85rem;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);color:#60a5fa;">⏳ Verificando...</div>';

    const r = await loginGeneral(u, p, examenData ? examenData.createdBy : '');
    if (r.success) {
      currentUser = r.user;
      currentUser.email = sinCorreo ? '' : emailInput;

      // Check for active session (anti-trampa)
      const sesionCheck = await registrarSesion(currentUser.id, examenId);
      if (!sesionCheck.success) {
        document.getElementById('loginMsg').innerHTML = '<div class="msg msg-err">🚫 ' + sesionCheck.error + '</div>';
        return;
      }
      currentSesionId = sesionCheck.sesionId;

      iniciarExamen();
    }
    else { document.getElementById('loginMsg').innerHTML='<div class="msg msg-err">❌ '+r.error+'</div>'; }
  }

  function iniciarExamen() {
    if (!examenData || !examenData.preguntas || examenData.preguntas.length === 0) {
      document.getElementById('loginMsg').innerHTML='<div class="msg msg-err">❌ Este examen no tiene preguntas configuradas.</div>';
      return;
    }
    document.getElementById('secLogin').classList.add('hidden');
    document.getElementById('examHeader').classList.add('hidden');
    document.getElementById('secExamen').classList.remove('hidden');
    // Show sticky timer bar
    document.getElementById('timerBar').classList.remove('hidden');
    document.getElementById('timerExamTitle').textContent = examenData.titulo || '';
    cargarPreguntas();
    document.getElementById('totalPreg').textContent = examenData.preguntas.length;
    actualizarTiempo();
    timer = setInterval(() => {
      tiempoRestante--;
      actualizarTiempo();
      if (tiempoRestante <= 0) { clearInterval(timer); finalizar(); }
    }, 1000);
  }

  function actualizarTiempo() {
    const m = Math.floor(tiempoRestante/60); const s = tiempoRestante%60;
    const timeStr = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    document.getElementById('tiempo').textContent = timeStr;
    // Color changes
    const td = document.getElementById('timerDisplay');
    if (td) {
      td.className = 'timer-display';
      if (tiempoRestante <= 60) td.classList.add('timer-critical');
      else if (tiempoRestante <= 300) td.classList.add('timer-warning');
    }
  }

  function cargarPreguntas() {
    const container = document.getElementById('preguntasContainer');
    if (!container) { console.error('preguntasContainer not found'); return; }
    container.innerHTML = '';

    if (!examenData || !examenData.preguntas || examenData.preguntas.length === 0) {
      container.innerHTML = '<div class="card" style="text-align:center;color:#f87171;">❌ Este examen no tiene preguntas.</div>';
      return;
    }

    examenData.preguntas.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'pregunta';

      if (item.tipo === 'pares') {
        // ── Flechas / click-to-connect ──
        const pares = item.pares || [];
        // Shuffle right side
        const derItems = pares.map((p, i) => ({ text: p.der, origIdx: i }));
        for (let i = derItems.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [derItems[i], derItems[j]] = [derItems[j], derItems[i]];
        }
        item._derShuffled = derItems;
        item._conexiones = {}; // { izqIdx: derShuffledIdx }

        let izqHtml = pares.map((p, pi) =>
          `<div class="par-btn" id="izq_${idx}_${pi}" onclick="clickIzq(${idx},${pi})">${p.izq}</div>`
        ).join('');

        let derHtml = derItems.map((d, di) =>
          `<div class="par-btn par-btn-der" id="der_${idx}_${di}" onclick="clickDer(${idx},${di})">${d.text}</div>`
        ).join('');

        div.innerHTML = `
          <div class="pregunta-num">${idx + 1}</div>
          <h3>${item.pregunta}</h3>
          <div class="pares-hint">
            🔗 <strong>Cómo responder:</strong> Clic en un elemento de la izquierda → luego clic en su par de la derecha.<br>
            🎨 <strong>Las respuestas asociadas comparten el mismo color</strong> (borde + flecha).<br>
            ✏️ Para deshacer una conexión, clic sobre la flecha o sobre el elemento izquierdo ya conectado.
          </div>
          <div class="pares-wrap" id="paresWrap_${idx}">
            <div class="pares-col-izq" id="colIzq_${idx}">${izqHtml}</div>
            <div class="pares-svg-area" id="svgArea_${idx}">
              <svg id="svgLines_${idx}"></svg>
            </div>
            <div class="pares-col-der" id="colDer_${idx}">${derHtml}</div>
          </div>
          <button class="pares-reset" onclick="resetPares(${idx})">🗑️ Borrar todas las conexiones</button>`;
      } else {
        // ── Original multiple choice / single choice ──
        const esMulti = Array.isArray(item.correcta);
        const inputType = esMulti ? 'checkbox' : 'radio';
        // Shuffle options
        const opts = item.opciones.map((t, i) => ({ t, i }));
        for (let i = opts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [opts[i], opts[j]] = [opts[j], opts[i]]; }
        item._shuffled = opts;
        item._shuffledCorrecta = esMulti ? item.correcta.map(c => opts.findIndex(o => o.i === c)) : opts.findIndex(o => o.i === item.correcta);

        let optsHtml = esMulti ? '<p class="multi-hint">📌 Seleccione ' + item.correcta.length + ' respuestas</p>' : '';
        opts.forEach((o, i) => { optsHtml += `<div class="opcion"><label><input type="${inputType}" name="p${idx}" value="${i}" onchange="updateProgress()"><span>${o.t}</span></label></div>`; });
        const imgHtml = item.imagen ? `<img src="${item.imagen}" alt="Imagen">` : '';

        div.innerHTML = `<div class="pregunta-num">${idx + 1}</div><h3>${item.pregunta}</h3>${imgHtml}${optsHtml}`;
      }

      container.appendChild(div);
    });

    // Apply anti-AI zero-width characters after rendering
    setTimeout(applyAntiAI, 100);
  }

  // ── Click-to-connect arrows for Pares ──
  let paresSelIzq = null; // { pregIdx, izqIdx }

  function clickIzq(pregIdx, izqIdx) {
    const item = examenData.preguntas[pregIdx];
    // If already selected same, deselect
    if (paresSelIzq && paresSelIzq.pregIdx === pregIdx && paresSelIzq.izqIdx === izqIdx) {
      paresSelIzq = null;
      document.querySelectorAll(`#colIzq_${pregIdx} .par-btn`).forEach(b => b.classList.remove('selected'));
      return;
    }
    // If this izq already has a connection, remove it first
    if (item._conexiones[izqIdx] !== undefined) {
      delete item._conexiones[izqIdx];
      redrawLines(pregIdx);
    }
    // Select this izq
    paresSelIzq = { pregIdx, izqIdx };
    document.querySelectorAll(`#colIzq_${pregIdx} .par-btn`).forEach(b => b.classList.remove('selected'));
    document.getElementById(`izq_${pregIdx}_${izqIdx}`).classList.add('selected');
  }

  function clickDer(pregIdx, derIdx) {
    const item = examenData.preguntas[pregIdx];
    if (!paresSelIzq || paresSelIzq.pregIdx !== pregIdx) {
      // No izq selected — if this der is connected, remove that connection
      const existingIzq = Object.keys(item._conexiones).find(k => item._conexiones[k] === derIdx);
      if (existingIzq !== undefined) {
        delete item._conexiones[existingIzq];
        redrawLines(pregIdx);
        updateProgress();
      }
      return;
    }
    // Remove any existing connection to this der
    const existingIzq = Object.keys(item._conexiones).find(k => item._conexiones[k] === derIdx);
    if (existingIzq !== undefined) delete item._conexiones[existingIzq];

    // Connect
    item._conexiones[paresSelIzq.izqIdx] = derIdx;
    paresSelIzq = null;
    document.querySelectorAll(`#colIzq_${pregIdx} .par-btn`).forEach(b => b.classList.remove('selected'));
    redrawLines(pregIdx);
    updateProgress();
  }

  // ── Color palette for pairs ──
  const PARES_COLORS = [
    { border: '#60a5fa', bg: 'rgba(96,165,250,0.12)', glow: 'rgba(96,165,250,0.3)'  },  // blue
    { border: '#34d399', bg: 'rgba(52,211,153,0.12)', glow: 'rgba(52,211,153,0.3)'  },  // green
    { border: '#f472b6', bg: 'rgba(244,114,182,0.12)', glow: 'rgba(244,114,182,0.3)' }, // pink
    { border: '#fb923c', bg: 'rgba(251,146,60,0.12)', glow: 'rgba(251,146,60,0.3)'  },  // orange
    { border: '#a78bfa', bg: 'rgba(167,139,250,0.12)', glow: 'rgba(167,139,250,0.3)' }, // purple
    { border: '#facc15', bg: 'rgba(250,204,21,0.12)', glow: 'rgba(250,204,21,0.3)'  },  // yellow
    { border: '#22d3ee', bg: 'rgba(34,211,238,0.12)', glow: 'rgba(34,211,238,0.3)'  },  // cyan
    { border: '#f87171', bg: 'rgba(248,113,113,0.12)', glow: 'rgba(248,113,113,0.3)' }, // red
  ];

  function redrawLines(pregIdx) {
    const item = examenData.preguntas[pregIdx];
    const svgEl = document.getElementById(`svgLines_${pregIdx}`);
    const svgArea = document.getElementById(`svgArea_${pregIdx}`);
    if (!svgEl || !svgArea) return;

    svgEl.innerHTML = '';
    const areaRect = svgArea.getBoundingClientRect();

    // Reset all button styles first
    const pares = item.pares || [];
    pares.forEach((_, pi) => {
      const btn = document.getElementById(`izq_${pregIdx}_${pi}`);
      if (btn) { btn.style.borderColor = ''; btn.style.background = ''; btn.style.boxShadow = ''; btn.style.color = ''; }
    });
    (item._derShuffled || []).forEach((_, di) => {
      const btn = document.getElementById(`der_${pregIdx}_${di}`);
      if (btn) { btn.style.borderColor = ''; btn.style.background = ''; btn.style.boxShadow = ''; btn.style.color = ''; }
    });

    // Assign a color index per izqIdx (order of connection)
    const colorMap = {}; // izqIdx → colorIdx
    let colorIdx = 0;
    Object.keys(item._conexiones).forEach(izqIdx => {
      colorMap[izqIdx] = colorIdx % PARES_COLORS.length;
      colorIdx++;
    });

    // Apply colors and draw lines
    Object.entries(item._conexiones).forEach(([izqIdx, derIdx]) => {
      const ci = colorMap[izqIdx];
      const col = PARES_COLORS[ci];

      const izqEl = document.getElementById(`izq_${pregIdx}_${izqIdx}`);
      const derEl = document.getElementById(`der_${pregIdx}_${derIdx}`);
      if (!izqEl || !derEl) return;

      // Color the buttons
      izqEl.style.borderColor = col.border;
      izqEl.style.background = col.bg;
      izqEl.style.boxShadow = `0 0 12px ${col.glow}`;
      izqEl.style.color = '#f8fafc';
      derEl.style.borderColor = col.border;
      derEl.style.background = col.bg;
      derEl.style.boxShadow = `0 0 12px ${col.glow}`;
      derEl.style.color = '#f8fafc';

      // Draw curved line
      const izqRect = izqEl.getBoundingClientRect();
      const derRect = derEl.getBoundingClientRect();
      const x1 = izqRect.right - areaRect.left;
      const y1 = izqRect.top + izqRect.height / 2 - areaRect.top;
      const x2 = derRect.left - areaRect.left;
      const y2 = derRect.top + derRect.height / 2 - areaRect.top;
      const cx = (x1 + x2) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
      path.setAttribute('stroke', col.border);
      path.setAttribute('stroke-width', '2.5');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-linecap', 'round');
      path.style.cursor = 'pointer';
      path.style.pointerEvents = 'stroke';
      path.addEventListener('click', () => {
        delete item._conexiones[izqIdx];
        redrawLines(pregIdx);
        updateProgress();
      });

      // Arrow head
      const angle = Math.atan2(y2 - y1, x2 - x1);
      const aw = 8;
      const ax1 = x2 - aw * Math.cos(angle - 0.4);
      const ay1 = y2 - aw * Math.sin(angle - 0.4);
      const ax2 = x2 - aw * Math.cos(angle + 0.4);
      const ay2 = y2 - aw * Math.sin(angle + 0.4);
      const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      arrow.setAttribute('points', `${x2},${y2} ${ax1},${ay1} ${ax2},${ay2}`);
      arrow.setAttribute('fill', col.border);
      arrow.style.cursor = 'pointer';
      arrow.style.pointerEvents = 'all';
      arrow.addEventListener('click', () => {
        delete item._conexiones[izqIdx];
        redrawLines(pregIdx);
        updateProgress();
      });

      svgEl.appendChild(path);
      svgEl.appendChild(arrow);
    });
  }

  function resetPares(pregIdx) {
    const item = examenData.preguntas[pregIdx];
    item._conexiones = {};
    paresSelIzq = null;
    document.querySelectorAll(`#colIzq_${pregIdx} .par-btn`).forEach(b => { b.classList.remove('selected','connected'); });
    document.querySelectorAll(`#colDer_${pregIdx} .par-btn`).forEach(b => { b.classList.remove('connected'); });
    redrawLines(pregIdx);
    updateProgress();
  }

  // Release session on page close/leave
  window.addEventListener('beforeunload', () => {
    if (currentUser && examenId) liberarSesion(currentUser.id, examenId);
  });

  // Redraw lines on scroll/resize (positions change)
  window.addEventListener('resize', () => {
    if (!examenData) return;
    examenData.preguntas.forEach((item, idx) => {
      if (item.tipo === 'pares') redrawLines(idx);
    });
  });

  function updateProgress() {
    let answered = 0;
    examenData.preguntas.forEach((item, i) => {
      if (item.tipo === 'pares') {
        const totalPares = (item.pares || []).length;
        const connected = Object.keys(item._conexiones || {}).length;
        if (connected === totalPares) answered++;
      } else {
        if (document.querySelector(`input[name="p${i}"]:checked`)) answered++;
      }
    });
    document.getElementById('respondidas').textContent = answered;
    document.getElementById('progressBar').style.width = Math.round(answered / examenData.preguntas.length * 100) + '%';
  }

  async function finalizar() {
    clearInterval(timer);

    // Release session lock
    if (currentUser) await liberarSesion(currentUser.id, examenId);
    let correctas = 0;
    let puntosObtenidos = 0;
    let puntosTotales = 0;

    examenData.preguntas.forEach((item, idx) => {
      const puntosPreg = item.puntos || 1;
      puntosTotales += puntosPreg;
      let acerto = false;

      if (item.tipo === 'pares') {
        const conexiones = item._conexiones || {};
        acerto = (item.pares || []).every((par, pi) => {
          const derShuffledIdx = conexiones[pi];
          if (derShuffledIdx === undefined) return false;
          return item._derShuffled[derShuffledIdx]?.origIdx === pi;
        });
      } else {
        const esMulti = Array.isArray(item.correcta);
        if (esMulti) {
          const checked = Array.from(document.querySelectorAll(`input[name="p${idx}"]:checked`)).map(el=>parseInt(el.value)).sort();
          const correct = (Array.isArray(item._shuffledCorrecta)?item._shuffledCorrecta:[]).sort();
          acerto = checked.length===correct.length && checked.every((v,i)=>v===correct[i]);
        } else {
          const sel = document.querySelector(`input[name="p${idx}"]:checked`);
          acerto = sel && parseInt(sel.value) === item._shuffledCorrecta;
        }
      }

      if (acerto) { correctas++; puntosObtenidos += puntosPreg; }
    });

    // Calculate final grade based on scale
    const notaMaxima = examenData.notaMaxima || 100;
    const notaFinal = Math.round((puntosObtenidos / puntosTotales) * notaMaxima * 100) / 100;
    const nota = notaFinal;
    const aprobado = nota >= (examenData.notaMinima || (notaMaxima * 0.7));

    // Save to Firebase
    if (currentUser) {
      await saveGrade({ examenId, examenTitulo: examenData.titulo, userId: currentUser.id, username: currentUser.username, nombre: currentUser.nombre, nota, totalPreguntas: examenData.preguntas.length, correctas, aprobado, createdBy: examenData.createdBy||'', puntosObtenidos, puntosTotales, notaMaxima });
    }

    document.getElementById('secExamen').classList.add('hidden');
    document.getElementById('secResultado').classList.remove('hidden');
    document.getElementById('secResultado').innerHTML = `<div class="resultado ${aprobado?'aprobado':'reprobado'}"><h2>${aprobado?'🎉 ¡Aprobó!':'😔 Reprobó'}</h2><p style="color:#94a3b8;">Estudiante: <strong style="color:#f1f5f9;">${currentUser?currentUser.nombre:'—'}</strong></p><div class="nota-badge">${nota} / ${notaMaxima}</div><p style="color:#94a3b8;margin-top:8px;">Correctas: ${correctas} de ${examenData.preguntas.length} | Puntos: ${puntosObtenidos}/${puntosTotales}</p><div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"><button onclick="generarPDF(${nota},${correctas},${aprobado})" class="btn btn-primary" style="padding:10px 20px;font-size:0.85rem;">📄 Descargar PDF</button></div><p style="color:#64748b;margin-top:12px;font-size:0.8rem;">${currentUser&&currentUser.email?'📧 Se envió un resumen a '+currentUser.email:''}  </p></div>`;

    // Send email (if email provided)
    enviarEmail(nota, correctas, aprobado);
  }

  function generarPDF(nota, correctas, aprobado) {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const fecha = new Date().toLocaleString('es-ES');
      const nombre = currentUser ? currentUser.nombre : 'Estudiante';
      const status = aprobado ? 'APROBADO' : 'REPROBADO';

      // Header
      const institucion = examenData.institucion || currentUser.institucion || 'Evaluacion Digital';
      doc.setFontSize(18);
      doc.setFont('helvetica', 'bold');
      doc.text(institucion, 105, 20, { align: 'center' });
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text('Comprobante de evaluacion', 105, 27, { align: 'center' });

      // Line
      doc.setDrawColor(0, 120, 212);
      doc.setLineWidth(0.5);
      doc.line(20, 32, 190, 32);

      // Info
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.text('COMPROBANTE DE EXAMEN', 20, 42);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text('Estudiante: ' + nombre, 20, 52);
      doc.text('Curso: ' + (currentUser.curso || 'Sin curso'), 20, 58);
      doc.text('Profesor: ' + (examenData.createdByName || 'No especificado'), 20, 64);
      doc.text('Institucion: ' + (examenData.institucion || currentUser.institucion || 'No especificada'), 20, 70);
      doc.text('Examen: ' + (examenData.titulo || 'Sin titulo'), 20, 76);
      doc.text('Fecha: ' + fecha, 20, 82);
      doc.text('Nota: ' + nota + '/100 — ' + status, 20, 88);
      doc.text('Preguntas correctas: ' + correctas + ' de ' + examenData.preguntas.length, 20, 94);

      // Line
      doc.line(20, 99, 190, 99);

      // Questions detail
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.text('DETALLE DE RESPUESTAS', 20, 107);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(100, 100, 100);
      doc.text('(CORRECTA = respuesta acertada | INCORRECTA = respuesta errada)', 20, 113);

      let y = 122;
      examenData.preguntas.forEach((item, idx) => {
        if (y > 260) { doc.addPage(); y = 20; }

        let respuestaUsuario = '';
        let respuestaCorrecta = '';
        let esCorrecta = false;

        if (item.tipo === 'pares') {
          const conexiones = item._conexiones || {};
          const pares = item.pares || [];
          esCorrecta = pares.every((par, pi) => {
            const derShuffledIdx = conexiones[pi];
            if (derShuffledIdx === undefined) return false;
            return item._derShuffled[derShuffledIdx]?.origIdx === pi;
          });
          respuestaUsuario = pares.map((par, pi) => {
            const derShuffledIdx = conexiones[pi];
            const der = derShuffledIdx !== undefined ? (item._derShuffled[derShuffledIdx]?.text || '?') : 'Sin respuesta';
            return par.izq + ' → ' + der;
          }).join(' | ');
          respuestaCorrecta = pares.map(p => p.izq + ' → ' + p.der).join(' | ');
        } else {
          const esMulti = Array.isArray(item.correcta);
          if (esMulti) {
            const checked = Array.from(document.querySelectorAll(`input[name="p${idx}"]:checked`)).map(el=>parseInt(el.value));
            respuestaUsuario = checked.map(i => item._shuffled[i]?.t || '?').join(', ') || 'Sin respuesta';
            respuestaCorrecta = item.correcta.map(i => item.opciones[i]).join(', ');
            const correct = (Array.isArray(item._shuffledCorrecta)?item._shuffledCorrecta:[]).sort();
            esCorrecta = checked.sort().length===correct.length && checked.every((v,i)=>v===correct[i]);
          } else {
            const sel = document.querySelector(`input[name="p${idx}"]:checked`);
            respuestaUsuario = sel ? (item._shuffled[parseInt(sel.value)]?.t || '?') : 'Sin respuesta';
            respuestaCorrecta = item.opciones[item.correcta];
            esCorrecta = sel && parseInt(sel.value) === item._shuffledCorrecta;
          }
        }

        // Question number and text
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(0, 0, 0);
        doc.text((idx+1) + '. ' + item.pregunta.substring(0, 95), 20, y);
        y += 5;

        // Result label: CORRECTA or INCORRECTA
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        if (esCorrecta) {
          doc.setTextColor(0, 150, 0);
          doc.text('   CORRECTA', 20, y);
        } else {
          doc.setTextColor(200, 0, 0);
          doc.text('   INCORRECTA', 20, y);
        }
        y += 5;

        // What the student answered
        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(60, 60, 60);
        doc.text('   Tu respuesta: ' + respuestaUsuario.substring(0, 85), 20, y);
        y += 4;

        // If incorrect, show the correct answer
        if (!esCorrecta) {
          doc.setTextColor(0, 100, 0);
          doc.text('   Respuesta correcta: ' + respuestaCorrecta.substring(0, 85), 20, y);
          y += 4;
        }

        // Separator
        doc.setDrawColor(200, 200, 200);
        doc.setLineWidth(0.1);
        doc.line(20, y + 1, 190, y + 1);
        y += 5;

        doc.setTextColor(0, 0, 0);
        y += 3;
      });

      // Footer
      doc.setFontSize(8);
      doc.setTextColor(128, 128, 128);
      doc.text('Documento generado automáticamente por Evaluación Digital — ' + fecha, 105, 290, { align: 'center' });

      // Download
      doc.save('Examen_' + nombre.replace(/\s/g, '_') + '_' + nota + '.pdf');
    } catch(e) {
      console.error('Error generando PDF:', e);
    }
  }

      if (!emailDest) {
        console.log('Sin email — no se envia correo');

      }
      console.log('Enviando email a:', emailDest);
      emailjs.send('service_i7gv5pq', 'template_gi85ryj', {
        to_email: emailDest,
        email: emailDest,
        student_name: currentUser.nombre || currentUser.username,
        exam_name: examenData.titulo || 'Examen',
        date: new Date().toLocaleString('es-ES'),
        score: String(nota),
        status: aprobado ? 'APROBADO' : 'REPROBADO',
        correct: String(correctas),
        total: String(examenData.preguntas.length)
      }).then(function(response) {
        console.log('Email enviado OK:', response);
      }).catch(function(err) {
        console.error('Error enviando email:', err);
      });
    } catch(e) {
      console.error('Error con EmailJS:', e);
    }
  }
</script>
</body>
</html>
